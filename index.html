<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBIT — Kamus Besar Ilmu Tasawuf Indonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --ink-950:#0a2e22;
  --ink-900:#0e3a2b;
  --ink-800:#134634;
  --ink-700:#1a5642;
  --gold-600:#a9822f;
  --gold-500:#c6a04a;
  --gold-400:#d9bd74;
  --gold-100:#f6ecd2;
  --paper:#faf8f2;
  --paper-dim:#f1ede1;
  --card:#ffffff;
  --line:#e7e1cf;
  --ink:#1c2420;
  --ink-soft:#5b6560;
  --ink-faint:#8b9490;
  --maroon:#7a3b2e;
  --shadow-sm:0 1px 2px rgba(14,58,43,.06), 0 1px 1px rgba(14,58,43,.04);
  --shadow-md:0 6px 20px rgba(14,58,43,.10), 0 2px 6px rgba(14,58,43,.06);
  --shadow-lg:0 20px 45px rgba(10,46,34,.18);
  --radius-s:8px;
  --radius-m:14px;
  --radius-l:22px;
  --sidebar-w:264px;
  --topbar-h:72px;
  --font-display:'Lora', serif;
  --font-arabic:'Amiri', serif;
  --font-body:'Plus Jakarta Sans', sans-serif;
}

*,*::before,*::after{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--gold-400);color:var(--ink-950);}

:focus-visible{outline:2px solid var(--gold-500);outline-offset:2px;}

/* scrollbar */
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-400);}

.arabic{font-family:var(--font-arabic);direction:rtl;}

/* ============ LAYOUT SHELL ============ */
.shell{
  display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  min-height:100vh;
}

/* ============ SIDEBAR ============ */
.sidebar{
  background:linear-gradient(185deg, var(--ink-900), var(--ink-950) 70%);
  color:#eef2ee;
  padding:22px 16px 18px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:40;
  border-right:1px solid rgba(255,255,255,.06);
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  padding:4px 8px 14px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.brand-mark{
  width:42px;height:42px;border-radius:11px;
  background:radial-gradient(circle at 30% 30%, var(--gold-400), var(--gold-600));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;color:var(--ink-950);
  font-size:17px;flex:none;
  box-shadow:var(--shadow-sm);
}
.brand-text{line-height:1.15;}
.brand-text .t1{font-family:var(--font-display);font-weight:700;font-size:16.5px;letter-spacing:.03em;color:#fff;}
.brand-text .t2{font-size:10.5px;color:#a9c0b3;margin-top:2px;letter-spacing:.01em;}

.nav-group{display:flex;flex-direction:column;gap:2px;}
.nav-label{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;
  color:#7fa08e;padding:12px 12px 6px;font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  font-size:14px;color:#cfe0d5;font-weight:500;
  transition:background .15s ease, color .15s ease;
  position:relative;
}
.nav-item svg{flex:none;opacity:.85;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{
  background:linear-gradient(90deg, rgba(198,160,74,.22), rgba(198,160,74,.05));
  color:#fff;
}
.nav-item.active::before{
  content:"";position:absolute;left:-16px;top:8px;bottom:8px;width:3px;
  background:var(--gold-500);border-radius:2px;
}
.nav-item .count{
  margin-left:auto;font-size:11px;color:#8ba698;background:rgba(255,255,255,.06);
  padding:2px 7px;border-radius:20px;font-weight:600;
}
.nav-item.active .count{color:var(--gold-100);background:rgba(198,160,74,.25);}

.sidebar-foot{
  margin-top:auto;
  padding-top:16px;
  border-top:1px solid rgba(255,255,255,.08);
}
.quote-card{
  background:linear-gradient(160deg, rgba(198,160,74,.14), rgba(198,160,74,.03));
  border:1px solid rgba(198,160,74,.25);
  border-radius:var(--radius-m);
  padding:16px;
  font-family:var(--font-display);
  font-style:italic;
  font-size:12.5px;
  line-height:1.6;
  color:#e3d9bc;
  position:relative;
  overflow:hidden;
}
.quote-card::before{
  content:"☾";position:absolute;top:-6px;right:8px;font-size:44px;color:rgba(198,160,74,.18);font-style:normal;
}
.sidebar-copy{font-size:10.5px;color:#6f8a7c;text-align:center;margin-top:12px;}

/* ============ TOPBAR ============ */
.topbar{
  position:sticky;top:0;z-index:30;
  height:var(--topbar-h);
  background:rgba(250,248,242,.85);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;
  padding:0 26px;
}
.menu-toggle{
  display:none;background:none;border:1px solid var(--line);border-radius:10px;
  width:38px;height:38px;align-items:center;justify-content:center;color:var(--ink-900);
}
.crumb{
  font-size:12.5px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;
  white-space:nowrap;
}
.crumb b{color:var(--ink-900);font-weight:600;}
.searchbar{
  flex:1;max-width:460px;
  display:flex;align-items:center;gap:10px;
  background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:9px 14px;color:var(--ink-faint);
}
.searchbar input{
  border:none;outline:none;flex:1;font-size:13.5px;font-family:inherit;background:transparent;color:var(--ink);
}
.searchbar .kbd{
  font-size:10.5px;border:1px solid var(--line);border-radius:6px;padding:2px 6px;color:var(--ink-faint);
}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:#fff;
  display:flex;align-items:center;justify-content:center;color:var(--ink-800);position:relative;flex:none;
}
.icon-btn .dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--maroon);border:1.5px solid #fff;
}
.user-chip{display:flex;align-items:center;gap:9px;padding-left:6px;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(160deg, var(--gold-400), var(--gold-600));
  display:flex;align-items:center;justify-content:center;color:var(--ink-950);font-weight:700;font-size:13px;flex:none;
}
.user-chip .name{font-size:13px;font-weight:600;color:var(--ink-900);line-height:1.2;}
.user-chip .role{font-size:11px;color:var(--ink-faint);}

/* ============ MAIN CONTENT ============ */
.main{min-width:0;}
.content{padding:26px 30px 60px;max-width:1360px;}

/* ============ HERO (Beranda) ============ */
.hero{
  position:relative;overflow:hidden;
  background:
    radial-gradient(circle at 15% 20%, rgba(198,160,74,.16), transparent 55%),
    radial-gradient(circle at 85% 80%, rgba(198,160,74,.10), transparent 50%),
    linear-gradient(160deg, var(--ink-900), var(--ink-950));
  border-radius:var(--radius-l);
  padding:48px 40px 40px;
  color:#fff;text-align:center;
  border:1px solid rgba(198,160,74,.25);
}
.hero-ornament{
  font-family:var(--font-arabic);
  font-size:clamp(28px,5vw,52px);
  color:var(--gold-400);
  margin-bottom:8px;
  direction:rtl;
  text-shadow:0 4px 24px rgba(198,160,74,.35);
}
.hero h1{
  font-family:var(--font-display);font-size:clamp(26px,3.4vw,38px);
  margin:6px 0 10px;font-weight:700;letter-spacing:.01em;
}
.hero p{color:#b9ccc0;font-size:14.5px;max-width:560px;margin:0 auto 26px;}
.hero-search{
  max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
  border-radius:14px;padding:6px 6px 6px 18px;
}
.hero-search input{
  flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:14px;font-family:inherit;padding:10px 0;
}
.hero-search input::placeholder{color:#93a99d;}
.hero-search button{
  background:var(--gold-500);color:var(--ink-950);border:none;border-radius:10px;
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;flex:none;
  transition:background .15s;
}
.hero-search button:hover{background:var(--gold-400);}

/* stat strip */
.stat-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:-30px;position:relative;z-index:2;padding:0 6px;
}
.stat-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);
  padding:18px 16px;text-align:center;box-shadow:var(--shadow-md);
  transition:transform .15s ease;cursor:pointer;
}
.stat-card:hover{transform:translateY(-3px);}
.stat-card .n{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--ink-900);}
.stat-card .l{font-size:11.5px;color:var(--ink-faint);margin-top:3px;font-weight:600;}

/* section headers */
.section{margin-top:44px;}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
.section-head h2{font-family:var(--font-display);font-size:20px;color:var(--ink-900);margin:0;}
.section-head .see-all{font-size:12.5px;color:var(--gold-600);font-weight:600;}
.section-head .see-all:hover{text-decoration:underline;}

/* kategori grid */
.kat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;}
.kat-item{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);
  padding:18px 10px;text-align:center;transition:all .15s ease;
}
.kat-item:hover{border-color:var(--gold-400);box-shadow:var(--shadow-sm);transform:translateY(-2px);}
.kat-icon{
  width:46px;height:46px;border-radius:50%;margin:0 auto 10px;
  background:linear-gradient(160deg, var(--ink-700), var(--ink-950));
  display:flex;align-items:center;justify-content:center;color:var(--gold-400);
}
.kat-item .kn{font-size:12.5px;font-weight:700;color:var(--ink-900);}
.kat-item .kc{font-size:10.5px;color:var(--ink-faint);margin-top:2px;}

/* three column preview */
.tri{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.panel{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);
  padding:18px;box-shadow:var(--shadow-sm);
}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.panel-head h3{font-family:var(--font-display);font-size:15.5px;margin:0;color:var(--ink-900);}
.panel-head .see-all{font-size:11.5px;color:var(--gold-600);font-weight:600;}
.mini-list{display:flex;flex-direction:column;gap:2px;}
.mini-item{padding:11px 6px;border-bottom:1px dashed var(--line);}
.mini-item:last-child{border-bottom:none;}
.mini-item .mt{font-size:13.5px;font-weight:700;color:var(--ink-900);}
.mini-item .ms{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.4;}

.person-row,.book-row{display:flex;gap:11px;padding:10px 6px;border-bottom:1px dashed var(--line);align-items:flex-start;}
.person-row:last-child,.book-row:last-child{border-bottom:none;}
.p-avatar{
  width:38px;height:38px;border-radius:50%;flex:none;
  background:linear-gradient(160deg,var(--ink-700),var(--ink-900));
  display:flex;align-items:center;justify-content:center;color:var(--gold-400);font-size:14px;font-weight:700;font-family:var(--font-display);
}
.b-icon{
  width:38px;height:32px;border-radius:6px;flex:none;margin-top:2px;
  background:linear-gradient(160deg,var(--gold-100),#efe2bd);
  display:flex;align-items:center;justify-content:center;color:var(--gold-600);
}
.person-row .pn,.book-row .bn{font-size:13.5px;font-weight:700;color:var(--ink-900);}
.person-row .ps,.book-row .bs{font-size:11.5px;color:var(--ink-soft);margin-top:2px;line-height:1.4;}

/* ============ LIST / GRID PAGE ============ */
.page-head{margin-bottom:22px;}
.page-head .eyebrow{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-600);font-weight:700;}
.page-head h1{font-family:var(--font-display);font-size:28px;color:var(--ink-900);margin:6px 0 6px;}
.page-head p{font-size:13.5px;color:var(--ink-soft);max-width:640px;margin:0;}

.toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);padding:12px 14px;
}
.toolbar .search-mini{
  display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);
  border-radius:10px;padding:8px 12px;flex:1;min-width:200px;
}
.toolbar .search-mini input{border:none;outline:none;background:transparent;font-size:13px;font-family:inherit;flex:1;}
.toolbar .result-count{font-size:12px;color:var(--ink-faint);white-space:nowrap;}

.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
.chip{
  padding:7px 14px;border-radius:30px;border:1px solid var(--line);background:var(--card);
  font-size:12.5px;font-weight:600;color:var(--ink-soft);transition:all .15s ease;
}
.chip:hover{border-color:var(--gold-400);}
.chip.active{background:var(--ink-900);border-color:var(--ink-900);color:#fff;}

.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.entry-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);
  padding:18px;box-shadow:var(--shadow-sm);transition:all .15s ease;position:relative;
}
.entry-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--gold-400);}
.entry-card .ec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.entry-card .ec-title{font-size:15.5px;font-weight:700;color:var(--ink-900);font-family:var(--font-display);}
.entry-card .ec-arabic{font-family:var(--font-arabic);font-size:16px;color:var(--gold-600);direction:rtl;}
.entry-card .ec-badge{
  display:inline-block;margin-top:8px;font-size:10.5px;font-weight:700;letter-spacing:.03em;
  color:var(--ink-700);background:var(--gold-100);padding:3px 9px;border-radius:20px;
}
.entry-card .ec-desc{font-size:12.5px;color:var(--ink-soft);margin-top:10px;line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.entry-card .fav-btn{
  background:none;border:none;color:var(--ink-faint);flex:none;padding:2px;
}
.entry-card .fav-btn.active{color:var(--maroon);}

.empty-state{
  text-align:center;padding:70px 20px;color:var(--ink-faint);
  background:var(--card);border:1px dashed var(--line);border-radius:var(--radius-m);
}
.empty-state .ei{font-size:40px;margin-bottom:10px;}
.empty-state h3{font-family:var(--font-display);color:var(--ink-800);margin:0 0 6px;}
.empty-state p{font-size:13px;max-width:380px;margin:0 auto;}

.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:28px;}
.pagination button{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--card);
  font-size:12.5px;font-weight:600;color:var(--ink-soft);
}
.pagination button.active{background:var(--ink-900);color:#fff;border-color:var(--ink-900);}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}

/* ============ DETAIL PAGE ============ */
.detail-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;}
.detail-main{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-l);padding:32px 34px;box-shadow:var(--shadow-sm);}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:22px;}
.detail-title h1{font-family:var(--font-display);font-size:30px;color:var(--ink-900);margin:0 0 6px;}
.detail-title .ar{font-family:var(--font-arabic);font-size:22px;color:var(--gold-600);direction:rtl;margin-bottom:10px;}
.detail-badges{display:flex;gap:8px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;letter-spacing:.02em;}
.badge.b-cat{background:var(--gold-100);color:var(--ink-700);}
.badge.b-sub{background:#eef2ee;color:var(--ink-soft);}
.detail-actions{display:flex;gap:8px;flex:none;}
.action-btn{
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-800);
  border:1px solid var(--line);background:var(--paper);border-radius:9px;padding:8px 12px;white-space:nowrap;
}
.action-btn:hover{border-color:var(--gold-400);}
.action-btn.active{background:var(--maroon);color:#fff;border-color:var(--maroon);}

.dblock{margin-bottom:24px;}
.dblock h4{
  font-size:11.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--gold-600);
  font-weight:700;margin:0 0 8px;
}
.dblock .body-text{font-size:14.5px;line-height:1.75;color:var(--ink);}
.dblock .quote-box{
  background:var(--paper-dim);border-left:3px solid var(--gold-500);border-radius:0 10px 10px 0;
  padding:14px 18px;font-size:13.5px;line-height:1.7;color:var(--ink-soft);font-style:italic;
}
.dblock .hadith-box{
  background:#fbf6ea;border:1px solid var(--gold-400);border-radius:10px;padding:14px 18px;
  font-size:13.5px;line-height:1.7;color:var(--ink-800);
}

.side-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);padding:20px;margin-bottom:16px;}
.side-card h4{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);margin:0 0 14px;font-weight:700;}
.info-row{margin-bottom:14px;}
.info-row:last-child{margin-bottom:0;}
.info-row .il{font-size:11px;color:var(--ink-faint);margin-bottom:3px;}
.info-row .iv{font-size:13.5px;color:var(--ink-900);font-weight:600;line-height:1.4;}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;}
.tag-pill{font-size:11px;background:var(--paper-dim);color:var(--ink-soft);padding:4px 10px;border-radius:20px;}
.related-pill{
  display:block;font-size:12.5px;color:var(--ink-800);padding:8px 4px;border-bottom:1px dashed var(--line);font-weight:600;
}
.related-pill:last-child{border-bottom:none;}
.related-pill:hover{color:var(--gold-600);}

.breadcrumb-nav{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-faint);margin-bottom:18px;flex-wrap:wrap;}
.breadcrumb-nav a:hover{color:var(--gold-600);}
.breadcrumb-nav b{color:var(--ink-900);}

/* Tokoh / Kitab detail extras */
.detail-illustration{
  width:100%;aspect-ratio:16/8;border-radius:var(--radius-m);overflow:hidden;margin-bottom:22px;
  background:linear-gradient(150deg, var(--ink-800), var(--ink-950));
  display:flex;align-items:center;justify-content:center;color:var(--gold-400);position:relative;
}
.detail-illustration::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 30% 30%, rgba(198,160,74,.25), transparent 60%);
}

/* ============ EMPTY / COMING SOON PAGE ============ */
.coming-soon{
  text-align:center;padding:90px 30px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-l);
}
.coming-soon .cs-icon{
  width:78px;height:78px;border-radius:50%;margin:0 auto 20px;
  background:linear-gradient(160deg, var(--ink-700), var(--ink-950));
  display:flex;align-items:center;justify-content:center;color:var(--gold-400);
}
.coming-soon h2{font-family:var(--font-display);font-size:22px;color:var(--ink-900);margin:0 0 8px;}
.coming-soon p{font-size:13.5px;color:var(--ink-soft);max-width:420px;margin:0 auto;}

/* about page */
.about-hero{
  background:linear-gradient(160deg, var(--ink-900), var(--ink-950));
  border-radius:var(--radius-l);padding:44px;color:#fff;margin-bottom:30px;
  border:1px solid rgba(198,160,74,.25);
}
.about-hero h1{font-family:var(--font-display);font-size:28px;margin:0 0 10px;}
.about-hero p{color:#b9ccc0;font-size:14px;line-height:1.7;max-width:680px;margin:0;}
.about-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.about-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-m);padding:22px;}
.about-card .ai{color:var(--gold-600);margin-bottom:12px;}
.about-card h3{font-family:var(--font-display);font-size:16px;margin:0 0 8px;color:var(--ink-900);}
.about-card p{font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin:0;}

/* toast */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink-950);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;
  box-shadow:var(--shadow-lg);z-index:100;opacity:0;pointer-events:none;transition:all .25s ease;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* overlay for mobile sidebar */
.overlay{position:fixed;inset:0;background:rgba(10,46,34,.5);z-index:39;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:auto;}

/* ============ SIDEBAR KALAM HIKMAH (compact fade slider) ============ */
.quote-card{position:relative;min-height:96px;}
.side-hikmah-slide{
  position:absolute;inset:0;padding:16px;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 1s ease;
}
.side-hikmah-slide.active{opacity:1;pointer-events:auto;position:relative;}
.side-hikmah-quote{
  font-family:var(--font-display);font-style:italic;font-size:12.5px;line-height:1.6;color:#e3d9bc;text-align:center;
}
.side-hikmah-dots{position:absolute;bottom:6px;left:0;right:0;display:flex;justify-content:center;gap:5px;z-index:2;}
.side-hikmah-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.25);border:none;padding:0;transition:all .2s;}
.side-hikmah-dot.active{background:var(--gold-500);width:14px;border-radius:4px;}

/* ============ KALAM HIKMAH SLIDER ============ */
.hikmah-slider{
  position:relative;min-height:230px;border-radius:var(--radius-l);overflow:hidden;
  background:radial-gradient(circle at 20% 20%, rgba(198,160,74,.14), transparent 55%), linear-gradient(160deg, var(--ink-900), var(--ink-950));
  border:1px solid rgba(198,160,74,.25);
}
.hikmah-slide{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:44px 60px 56px;opacity:0;pointer-events:none;transition:opacity 1s ease;
}
.hikmah-slide.active{opacity:1;pointer-events:auto;position:relative;}
.hikmah-mark{font-family:var(--font-display);font-size:46px;color:var(--gold-500);line-height:1;margin-bottom:6px;opacity:.8;}
.hikmah-quote{font-family:var(--font-display);font-style:italic;font-size:19px;line-height:1.6;color:#fff;max-width:640px;margin:0 0 16px;}
.hikmah-author{font-size:12.5px;color:var(--gold-400);font-weight:600;}
.hikmah-author span{color:#a9c0b3;font-weight:400;}
.hikmah-dots{position:absolute;bottom:18px;left:0;right:0;display:flex;justify-content:center;gap:7px;}
.hikmah-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);border:none;padding:0;transition:all .2s;}
.hikmah-dot.active{background:var(--gold-500);width:20px;border-radius:5px;}

/* ============ ADMIN DASHBOARD ============ */
body.admin-mode .sidebar{display:none;}
body.admin-mode .topbar{display:none;}
body.admin-mode .content{padding:0;max-width:none;}
body.admin-mode .shell{grid-template-columns:1fr;}
.admin-shell{display:flex;min-height:100vh;background:var(--paper);}
.admin-sidebar{
  width:250px;flex:none;background:linear-gradient(185deg, var(--ink-900), var(--ink-950) 70%);
  color:#eef2ee;padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:14px;border-right:1px solid rgba(255,255,255,.06);
}
.admin-brand{display:flex;align-items:center;gap:10px;padding:4px 8px 14px;border-bottom:1px solid rgba(255,255,255,.08);}
.admin-brand .t1{font-family:var(--font-display);font-weight:700;font-size:15px;color:#fff;}
.admin-brand .t2{font-size:10px;color:#a9c0b3;}
.admin-nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13.3px;
  color:#cfe0d5;font-weight:500;
}
.admin-nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.admin-nav-item.active{background:linear-gradient(90deg, rgba(198,160,74,.22), rgba(198,160,74,.05));color:#fff;}
.admin-main{flex:1;min-width:0;}
.admin-topbar{
  height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;
  padding:0 24px;gap:14px;position:sticky;top:0;z-index:20;
}
.admin-topbar h2{font-family:var(--font-display);font-size:17px;color:var(--ink-900);margin:0;}
.admin-content{padding:24px 26px 60px;max-width:1300px;}
.back-to-site{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gold-600);font-weight:700;margin-left:auto;
  border:1px solid var(--line);padding:7px 12px;border-radius:9px;
}

.admin-stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.admin-stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow-sm);}
.admin-stat .n{font-family:var(--font-display);font-size:21px;font-weight:700;color:var(--ink-900);}
.admin-stat .l{font-size:10.5px;color:var(--ink-faint);margin-top:3px;font-weight:600;}

.admin-grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;align-items:start;}
.admin-panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);}
.admin-panel h3{font-family:var(--font-display);font-size:15px;margin:0 0 14px;color:var(--ink-900);}

.activity-row{display:flex;gap:10px;padding:10px 2px;border-bottom:1px dashed var(--line);font-size:12.5px;}
.activity-row:last-child{border-bottom:none;}
.activity-dot{width:7px;height:7px;border-radius:50%;background:var(--gold-500);margin-top:5px;flex:none;}
.activity-row .at{color:var(--ink-900);font-weight:600;}
.activity-row .as{color:var(--ink-faint);font-size:11px;margin-top:2px;}

.donut-wrap{display:flex;align-items:center;gap:18px;}
.donut-legend{display:flex;flex-direction:column;gap:7px;font-size:11.5px;flex:1;}
.donut-legend .dl-item{display:flex;align-items:center;gap:7px;}
.donut-legend .sw{width:9px;height:9px;border-radius:3px;flex:none;}
.donut-legend .dn{color:var(--ink-soft);}
.donut-legend .dv{margin-left:auto;font-weight:700;color:var(--ink-900);}

.quick-actions{display:flex;flex-direction:column;gap:9px;}
.qa-btn{
  display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:10px;border:1px solid var(--line);
  background:var(--paper);font-size:12.8px;font-weight:700;color:var(--ink-800);
}
.qa-btn:hover{border-color:var(--gold-400);}
.qa-btn.primary{background:var(--ink-900);color:#fff;border-color:var(--ink-900);}
.qa-btn.primary:hover{background:var(--ink-800);}

.manage-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.manage-card{
  background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;
}
.manage-card .mi{width:38px;height:38px;border-radius:10px;margin:0 auto 8px;background:var(--gold-100);
  display:flex;align-items:center;justify-content:center;color:var(--gold-600);}
.manage-card .mn{font-size:12.5px;font-weight:700;color:var(--ink-900);}
.manage-card .mc{font-size:10.5px;color:var(--ink-faint);margin-top:2px;}

/* admin toolbar & table */
.admin-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.admin-toolbar .search-mini{flex:1;min-width:220px;}
.btn{
  display:inline-flex;align-items:center;gap:7px;font-size:12.8px;font-weight:700;padding:9px 15px;
  border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink-800);white-space:nowrap;
}
.btn.btn-primary{background:var(--ink-900);color:#fff;border-color:var(--ink-900);}
.btn.btn-primary:hover{background:var(--ink-800);}
.btn.btn-danger{color:var(--maroon);border-color:#e4c9c2;}
.btn.btn-danger:hover{background:#fbf1ef;}
.btn:hover{border-color:var(--gold-400);}
.btn-icon{width:32px;height:32px;padding:0;justify-content:center;}

.admin-table-wrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm);}
table.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
table.admin-table th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);
  padding:12px 16px;background:var(--paper-dim);border-bottom:1px solid var(--line);font-weight:700;
}
table.admin-table td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink);}
table.admin-table tr:last-child td{border-bottom:none;}
table.admin-table tr:hover td{background:var(--paper);}
.td-title{font-weight:700;color:var(--ink-900);}
.td-sub{font-size:11.5px;color:var(--ink-faint);margin-top:2px;max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}

/* admin forms */
.admin-form{background:#fff;border:1px solid var(--line);border-radius:14px;padding:26px;box-shadow:var(--shadow-sm);max-width:760px;}
.form-row{margin-bottom:16px;}
.form-row label{display:block;font-size:12px;font-weight:700;color:var(--ink-800);margin-bottom:6px;}
.form-row .hint{font-size:11px;color:var(--ink-faint);font-weight:400;margin-left:6px;}
.form-row input[type=text], .form-row input[type=url], .form-row textarea, .form-row select{
  width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;font-family:inherit;
  background:var(--paper);color:var(--ink);
}
.form-row textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-row input.arabic-input, .form-row textarea.arabic-input{
  font-family:var(--font-arabic);
  font-size:20px;
  line-height:2;
  text-align:right;
  background:#fbf8f0;
  border-color:var(--gold-400);
}
.form-row input.arabic-input::placeholder, .form-row textarea.arabic-input::placeholder{
  font-family:var(--font-body);
  font-size:12px;
  color:var(--ink-faint);
}
.form-row input:focus, .form-row textarea:focus, .form-row select:focus{border-color:var(--gold-500);background:#fff;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-actions{display:flex;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid var(--line);}

/* toggle switch */
.toggle{position:relative;width:40px;height:22px;flex:none;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle .track{position:absolute;inset:0;background:#d8d3c2;border-radius:20px;transition:.15s;cursor:pointer;}
.toggle .track::before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.toggle input:checked + .track{background:var(--ink-800);}
.toggle input:checked + .track::before{transform:translateX(18px);}

.menu-manage-row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px dashed var(--line);}
.menu-manage-row:last-child{border-bottom:none;}
.menu-manage-row .mm-icon{color:var(--gold-600);flex:none;}
.menu-manage-row .mm-label{font-size:13.5px;font-weight:600;color:var(--ink-900);flex:1;}

/* category manage */
.cat-manage-row{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px dashed var(--line);}
.cat-manage-row:last-child{border-bottom:none;}
.cat-manage-row .cm-name{font-weight:700;color:var(--ink-900);font-size:13.5px;}
.cat-manage-row .cm-count{font-size:11px;color:var(--ink-faint);}
.cat-add-row{display:flex;gap:8px;margin-top:14px;}
.cat-add-row input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;}

/* modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,46,34,.55);z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .18s;padding:20px;
}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-box{background:#fff;border-radius:16px;padding:26px;max-width:380px;width:100%;box-shadow:var(--shadow-lg);text-align:center;}
.modal-box .mi{width:52px;height:52px;border-radius:50%;background:#fbf1ef;color:var(--maroon);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.modal-box h3{font-family:var(--font-display);font-size:17px;margin:0 0 8px;color:var(--ink-900);}
.modal-box p{font-size:13px;color:var(--ink-soft);margin:0 0 20px;line-height:1.5;}
.modal-box .modal-actions{display:flex;gap:10px;}
.modal-box .modal-actions .btn{flex:1;justify-content:center;}

.badge-sm{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--gold-100);color:var(--ink-700);display:inline-block;}
.badge-type{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.badge-type.data{background:#e7f0ea;color:#2f6a4a;}
.badge-type.extra{background:#f1e9d6;color:var(--gold-600);}

@media (max-width: 1180px){
  .admin-stat-row{grid-template-columns:repeat(3,1fr);}
  .admin-grid-2{grid-template-columns:1fr;}
  .manage-grid{grid-template-columns:repeat(3,1fr);}
}
@media (max-width: 860px){
  .admin-shell{flex-direction:column;}
  .admin-sidebar{position:fixed;left:0;top:0;width:250px;transform:translateX(-100%);transition:transform .25s;z-index:60;}
  .admin-sidebar.open{transform:translateX(0);}
  .admin-content{padding:16px;}
  .admin-stat-row{grid-template-columns:repeat(2,1fr);}
  .manage-grid{grid-template-columns:repeat(2,1fr);}
  .form-grid-2{grid-template-columns:1fr;}
  table.admin-table{display:block;overflow-x:auto;white-space:nowrap;}
}

/* ============ RESPONSIVE ============ */
@media (max-width: 1180px){
  .kat-grid{grid-template-columns:repeat(4,1fr);}
  .tri{grid-template-columns:1fr 1fr;}
  .tri .panel:last-child{grid-column:1 / -1;}
  .card-grid{grid-template-columns:repeat(2,1fr);}
  .detail-grid{grid-template-columns:1fr;}
  .about-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width: 860px){
  .shell{grid-template-columns:1fr;}
  .sidebar{
    position:fixed;left:0;top:0;width:270px;transform:translateX(-100%);
    transition:transform .25s ease;box-shadow:var(--shadow-lg);
  }
  .sidebar.open{transform:translateX(0);}
  .menu-toggle{display:flex;}
  .stat-strip{grid-template-columns:repeat(2,1fr);}
  .kat-grid{grid-template-columns:repeat(3,1fr);}
  .card-grid{grid-template-columns:1fr;}
  .crumb{display:none;}
  .content{padding:18px 16px 50px;}
  .hero{padding:36px 20px 30px;}
  .about-grid{grid-template-columns:1fr;}
  .user-chip .name,.user-chip .role{display:none;}
}
@media (max-width: 520px){
  .kat-grid{grid-template-columns:repeat(2,1fr);}
  .toolbar{flex-direction:column;align-items:stretch;}
  .searchbar{display:none;}
  .detail-main{padding:22px 18px;}
  .detail-header{flex-direction:column;}
  .hikmah-slide{padding:32px 22px 44px;}
  .hikmah-quote{font-size:16px;}
}
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="shell">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">K</div>
      <div class="brand-text">
        <div class="t1">KBIT</div>
        <div class="t2">Kamus Besar Ilmu<br>Tasawuf Indonesia</div>
      </div>
    </div>

    <nav class="nav-group" id="navMain"></nav>
    <nav class="nav-group" id="navMeta"></nav>

    <div class="sidebar-foot">
      <div class="quote-card" id="sidebarHikmah">
        <div class="side-hikmah-quote">"Perjalanan terindah seorang hamba adalah saat hatinya dekat dengan Tuhannya."</div>
      </div>
      <div class="sidebar-copy">© 2026 KBIT Indonesia</div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="crumb" id="crumb"></div>
      <div class="searchbar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="globalSearch" placeholder="Cari istilah, tokoh, kitab, dzikir…" autocomplete="off">
        <span class="kbd">Ctrl K</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="notifBtn" aria-label="Notifikasi">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          <span class="dot"></span>
        </button>
        <button class="icon-btn" id="favBtn" aria-label="Favorit">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        </button>
        <div class="user-chip">
          <div class="avatar">A</div>
          <div>
            <div class="name">Ahmad</div>
            <div class="role">Salik</div>
          </div>
        </div>
      </div>
    </header>

    <main class="content" id="content"></main>
  </div>

at Ulama","r":"Referensi Kitab"},{"id":64,"n":"Ikhlas","a":"الإخلاص","k":"Akhlak","s":"Memurnikan niat karena Allah","d":"Melakukan seluruh amal semata-mata karena Allah tanpa mengharapkan pujian manusia.","q":"QS. Al-Bayyinah 98:5","h":"HR. Bukhari dan Muslim","u":"Al-Ghazali: Ikhlas adalah ruh segala amal.","r":"Ihya Ulumuddin"},{"id":65,"n":"Sidq","a":"الصدق","k":"Akhlak","s":"Kejujuran lahir dan batin","d":"Kesesuaian antara ucapan, perbuatan, dan isi hati dalam kebenaran.","q":"QS. At-Taubah 9:119","h":"HR. Bukhari","u":"Al-Qusyairi: Sidq adalah fondasi suluk.","r":"Risalah Al-Qusyairiyah"},{"id":66,"n":"Sabar","a":"الصبر","k":"Akhlak","s":"Keteguhan dalam ujian","d":"Menahan diri dalam ketaatan, meninggalkan maksiat, dan menghadapi cobaan.","q":"QS. Az-Zumar 39:10","h":"HR. Muslim","u":"Sabar adalah separuh iman.","r":"Ihya Ulumuddin"},{"id":67,"n":"Syukur","a":"الشكر","k":"Akhlak","s":"Berterima kasih kepada Allah","d":"Mengakui nikmat Allah dengan hati, lisan, dan amal.","q":"QS. Ibrahim 14:7","h":"HR. Bukhari","u":"Syukur menjaga dan menambah nikmat.","r":"Ihya Ulumuddin"},{"id":68,"n":"Tawakal","a":"التوكل","k":"Akhlak","s":"Bersandar kepada Allah","d":"Menyerahkan hasil kepada Allah setelah melakukan usaha yang maksimal.","q":"QS. Ali Imran 3:159","h":"HR. Tirmidzi","u":"Tawakal tidak meniadakan ikhtiar.","r":"Al-Hikam"},{"id":69,"n":"Ridha","a":"الرضا","k":"Akhlak","s":"Menerima ketentuan Allah","d":"Sikap lapang dada terhadap segala keputusan Allah.","q":"QS. Al-Maidah 5:119","h":"HR. Muslim","u":"Ridha adalah pintu ketenangan hati.","r":"Risalah Al-Qusyairiyah"},{"id":70,"n":"Khauf","a":"الخوف","k":"Akhlak","s":"Takut kepada Allah","d":"Rasa takut yang mendorong seseorang menjauhi maksiat.","q":"QS. Ali Imran 3:175","h":"HR. Muslim","u":"Khauf menjaga hati dari kelalaian.","r":"Ihya Ulumuddin"},{"id":71,"n":"Raja'","a":"الرجاء","k":"Akhlak","s":"Berharap kepada Allah","d":"Harapan akan rahmat dan ampunan Allah yang disertai amal saleh.","q":"QS. Al-Kah rsembunyi lebih dekat kepada keikhlasan.","r":"Al-Hikam"},{"id":88,"n":"Taqwa","a":"التقوى","k":"Akhlak","s":"Menjaga diri dari murka Allah","d":"Menjalankan perintah Allah dan menjauhi larangan-Nya.","q":"QS. Al-Baqarah 2:197","h":"HR. Tirmidzi","u":"Taqwa adalah bekal terbaik menuju Allah.","r":"Ihya Ulumuddin"},{"id":89,"n":"Birr","a":"البر","k":"Akhlak","s":"Kebajikan","d":"Segala bentuk kebaikan yang mendekatkan kepada Allah.","q":"QS. Al-Baqarah 2:177","h":"HR. Muslim","u":"Birr adalah akhlak yang baik.","r":"Riyadhus Shalihin"},{"id":90,"n":"Makhafah","a":"المخافة","k":"Akhlak","s":"Rasa takut yang mendalam","d":"Ketakutan kepada Allah yang lahir dari pengenalan terhadap kebesaran-Nya.","q":"QS. Fatir 35:28","h":"HR. Muslim","u":"Makhafah adalah buah makrifat.","r":"Risalah Al-Qusyairiyah"},{"id":91,"n":"Riya'","a":"الرياء","k":"Akhlak","s":"Pamer dalam ibadah","d":"Melakukan amal agar dilihat dan dipuji manusia.","q":"QS. Al-Ma'un 107:6","h":"HR. Muslim","u":"Riya adalah syirik kecil.","r":"Ihya Ulumuddin"},{"id":92,"n":"Ujub","a":"العجب","k":"Akhlak","s":"Kagum pada diri sendiri","d":"Merasa bangga terhadap amal dan kelebihan diri.","q":"QS. An-Najm 53:32","h":"HR. Muslim","u":"Ujub merusak amal.","r":"Ihya Ulumuddin"},{"id":93,"n":"Hasad","a":"الحسد","k":"Akhlak","s":"Iri terhadap nikmat orang lain","d":"Menginginkan hilangnya nikmat yang dimiliki orang lain.","q":"QS. Al-Falaq 113:5","h":"HR. Bukhari","u":"Hasad memakan kebaikan seperti api memakan kayu.","r":"Ihya Ulumuddin"},{"id":94,"n":"Hakikat dan Makrifat Lanjutan","a":"","k":"","s":"","d":"","q":"","h":"","u":"","r":""},{"id":95,"n":"Nama Istilah","a":"Teks Arab","k":"Kategori","s":"Definisi Singkat","d":"Definisi Lengkap","q":"Dalil Al-Quran","h":"Hadits Terkait","u":"Pendapat Ulama","r":"Referensi Kitab"},{"id":96,"n":"Musyahadah","a":"المشاهدة","k":"Hakikat","s":"Penyaksian hati","d":"Kesadaran hati yang menyaksikan tanda-tanda kebesaran Allah dalam segala sesuatu.","q":"QS. Fussilat 41:53","h":"HR. Muslim","u":"Musyahadah merupakan buah dari muraqabah.","r":"Risalah Al-Qusyairiyah"},{"id":97,"n":"Wushul","a":"الوصول","k":"Makrifat","s":"Sampai kepada Allah","d":"Sampainya hati kepada kedekatan dan pengenalan terhadap Allah.","q":"QS. Al-Insyiqaq 84:6","h":"HR. Muslim","u":"Wushul bukan perpindahan tempat tetapi kedekatan maknawi.","r":"Al-Hikam"},{"id":98,"n":"Kasyaf","a":"الكشف","k":"Makrifat","s":"Tersingkapnya tabir","d":"Terbukanya pemahaman ruhani setelah hati dibersihkan dari penyakit.","q":"QS. Qaf 50:22","h":"HR. Muslim","u":"Kasyaf bukan tujuan utama tasawuf.","r":"Ihya Ulumuddin"},{"id":99,"n":"Sirr","a":"السر","k":"Hakikat","s":"Rahasia hati","d":"Bagian terdalam hati yang menjadi tempat menerima cahaya ilahi.","q":"QS. Thaha 20:7","h":"HR. Muslim","u":"Sirr adalah salah satu lathifah ruhaniyah.","r":"Risalah Al-Qusyairiyah"},{"id":100,"n":"Sirrul Asrar","a":"سر الأسرار","k":"Hakikat","s":"Rahasia dari segala rahasia","d":"Tingkatan terdalam dari kesadaran ruhani seorang hamba.","q":"QS. Al-Mulk 67:13","h":"HR. Muslim","u":"Dibahas oleh Abdul Qadir Al-Jailani.","r":"Sirrul Asrar"},{"id":101,"n":"Fuad","a":"الفؤاد","k":"Hakikat","s":"Hati terdalam","d":"Pusat kesadaran ruhani dan penerimaan cahaya hidayah.","q":"QS. An-Najm 53:11","h":"HR. Muslim","u":"Fuad lebih halus daripada qalb.","r":"Ihya Ulumuddin"},{"id":102,"n":"Lubb","a":"اللب","k":"Hakikat","s":"Inti hati","d":"Esensi terdalam dari akal dan hati yang memahami hakikat.","q":"QS. Ali Imran 3:190","h":"HR. Muslim","u":"Ulul Albab adalah pemilik lubb.","r":"Tafsir Al-Qurthubi"},{"id":103,"n":"Nur","a":"النور","k":"Hakikat","s":"Cahaya ilahi","d":"Cahaya petunjuk Allah yang menerangi hati seorang mukmin.","q":"QS. An-Nur 24:35","h":"HR. Muslim","u":"Nur adalah kehidupan hati.","r":"Mishkatul Anwar"},{"id":104,"n":"Warid","a":"الوارد","k":"Hakikat","s":"Ilham yang datang ke hati","d":"Inspirasi ruhani yang dianugerahkan Allah kepada seorang salik.","q":"QS. Asy-Syura 42:52","h":"HR. Muslim","u":"Warid merupakan pemberian Allah.","r":"Risalah Al-Qusyairiyah"},{"id":105,"n":"Waridat","a":"الواردات","k":"Hakikat","s":"Limpahan ilham","d":"Berbagai bentuk inspirasi ruhani yang masuk ke dalam hati.","q":"QS. Al-Anfal 8:29","h":"HR. Muslim","u":"Waridat muncul sesuai kesiapan hati.","r":"Al-Hikam"},{"id":106,"n":"Ilham","a":"الإلهام","k":"Hakikat","s":"Bisikan kebaikan","d":"Pengetahuan yang Allah masukkan ke dalam hati seorang hamba.","q":"QS. Asy-Syams 91:8","h":"HR. Muslim","u":"Ilham tidak boleh bertentangan dengan syariat.","r":"Ihya Ulumuddin"},{"id":107,"n":"Firasat","a":"الفراسة","k":"Makrifat","s":"Ketajaman hati","d":"Kemampuan memahami keadaan berdasarkan cahaya iman.","q":"QS. Al-Hijr 15:75","h":"HR. Tirmidzi","u":"Takutlah terhadap firasat orang mukmin.","r":"Jami' At-Tirmidzi"},{"id":108,"n":"Basth","a":"البسط","k":"Hakikat","s":"Kelapangan ruhani","d":"Keadaan hati yang dipenuhi kegembiraan dan harapan kepada Allah.","q":"QS. Ar-Ra'd 13:26","h":"HR. Muslim","u":"Basth sering datang setelah qabd.","r":"Risalah Al-Qusyairiyah"},{"id":109,"n":"Qabd","a":"القبض","k":"Hakikat","s":"Penyempitan ruhani","d":"Keadaan hati yang terasa sempit sebagai ujian dan pendidikan ilahi.","q":"QS. Al-Baqarah 2:245","h":"HR. Muslim","u":"Qabd mendidik kerendahan hati.","r":"Risalah Al-Qusyairiyah"},{"id":110,"n":"Haybah","a":"الهيبة","k":"Hakikat","s":"Kewibawaan spiritual","d":"Perasaan kagum dan takut kepada keagungan Allah.","q":"QS. Az-Zumar 39:23","h":"HR. Muslim","u":"Haybah lahir dari makrifat.","r":"Al-Luma'"},{"id":111,"n":"Jam'","a":"الجمع","k":"Hakikat","s":"Penyatuan perhatian","d":"Memusatkan perhatian hanya kepada Allah.","q":"QS. Al-An'am 6:162","h":"HR. Muslim","u":"Jam' adalah maqam tauhid.","r":"Risalah Al-Qusyairiyah"},{"id":112,"n":"Farq","a":"الفرق","k":"Hakikat","s":"Kesadaran perbedaan","d":"Menyadari perbedaan antara Tuhan dan makhluk.","q":"QS. Asy-Syura 42:11","h":"HR. Muslim","u":"Farq menjaga akidah yang benar.","r":"Risalah Al-Qusyairiyah"},{"id":113,"n":"Jam'ul Jam'","a":"جمع الجمع","k":"Hakikat","s":"Kesempurnaan tauhid","d":"Tingkatan tinggi dalam penyatuan perhatian kepada Allah.","q":"QS. Al-Ikhlas 112:1","h":"HR. Muslim","u":"Dibahas oleh para sufi besar.","r":"Al-Luma'"},{"id":114,"n":"Talwin","a":"التلوين","k":"Hakikat","s":"Perubahan keadaan hati","d":"Berpindahnya kondisi ruhani dari satu keadaan ke keadaan lain.","q":"QS. Al-Baqarah 2:286","h":"HR. Muslim","u":"Talwin dialami para salik.","r":"Risalah Al-Qusyairiyah"},{"id":115,"n":"Tamkin","a":"التمكين","k":"Hakikat","s":"Keteguhan spiritual","d":"Stabilitas ruhani setelah melewati berbagai ujian maqam.","q":"QS. Yusuf 12:56","h":"HR. Muslim","u":"Tamkin lebih tinggi dari talwin.","r":"Risalah Al-Qusyairiyah"},{"id":116,"n":"Tajrid","a":"التجريد","k":"Hakikat","s":"Melepaskan ketergantungan","d":"Membebaskan hati dari ketergantungan selain Allah.","q":"QS. Ath-Thalaq 65:3","h":"HR. Muslim","u":"Dibahas luas dalam Al-Hikam.","r":"Al-Hikam"},{"id":117,"n":"Tafrid","a":"التفريد","k":"Hakikat","s":"Memurnikan tauhid","d":"Mengesakan tujuan hanya kepada Allah.","q":"QS. Al-An'am 6:162","h":"HR. Muslim","u":"Tafrid merupakan buah ikhlas.","r":"Risalah Al-Qusyairiyah"},{"id":118,"n":"Mukalamah","a":"المكالمة","k":"Hakikat","s":"Percakapan ruhani","d":"Pengertian ruhani yang hadir dalam hati seorang hamba.","q":"QS. Asy-Syura 42:51","h":"HR. Muslim","u":"Tidak sama dengan wahyu nabi.","r":"Ihya Ulumuddin"},{"id":119,"n":"Syuhud","a":"الشهود","k":"Hakikat","s":"Penyaksian kebenaran","d":"Kehadiran hati dalam menyaksikan kebesaran Allah.","q":"QS. Fussilat 41:53","h":"HR. Muslim","u":"Syuhud adalah buah dzikir.","r":"Al-Hikam"},{"id":120,"n":"Hudhur","a":"الحضور","k":"Hakikat","s":"Kehadiran hati","d":"Konsentrasi hati dalam beribadah kepada Allah.","q":"QS. Al-Mu'minun 23:1-2","h":"HR. Muslim","u":"Hudhur adalah lawan ghaflah.","r":"Ihya Ulumuddin"},{"id":121,"n":"Ghaibah","a":"الغيبة","k":"Hakikat","s":"Tenggelam dari kesadaran diri","d":"Keadaan hati yang larut dalam dzikir kepada Allah.","q":"QS. Al-A'raf 7:205","h":"HR. Muslim","u":"Dibahas dalam maqamat sufi.","r":"Risalah Al-Qusyairiyah"},{"id":122,"n":"Mukasyafah","a":"المكاشفة","k":"Hakikat","s":"Terbukanya hijab hati","d":"Penyingkapan hakikat yang Allah berikan kepada hamba.","q":"QS. Qaf 50:22","h":"HR. Muslim","u":"Mukasyafah lahir dari kesucian hati.","r":"Ihya Ulumuddin"},{"id":123,"n":"Ahlul Haqiqah","a":"أهل الحقيقة","k":"Hakikat","s":"Ahli hakikat","d":"Orang yang memahami dimensi batin agama.","q":"QS. Al-Ankabut 29:69","h":"HR. Muslim","u":"Mereka tetap berpegang pada syariat.","r":"Risalah Al-Qusyairiyah"},{"id":124,"n":"Ahlul Makrifah","a":"أهل المعرفة","k":"Makrifat","s":"Ahli makrifat","d":"Orang yang mengenal Allah melalui cahaya hati.","q":"QS. Muhammad 47:19","h":"HR. Muslim","u":"Makrifat adalah anugerah Allah.","r":"Ihya Ulumuddin"},{"id":125,"n":"Muqarrabin","a":"المقربون","k":"Makrifat","s":"Hamba yang dekat kepada Allah","d":"Golongan yang memperoleh kedudukan tinggi di sisi Allah.","q":"QS. Al-Waqi'ah 56:11","h":"HR. Muslim","u":"Muqarrabin adalah golongan pilihan.","r":"Tafsir Ibn Katsir"},{"id":126,"n":"Nafs, Lathifah, dan Tingkatan Ruhani","a":"","k":"","s":"","d":"","q":"","h":"","u":"","r":""},{"id":127,"n":"Nama Istilah","a":"Teks Arab","k":"Kategori","s":"Definisi Singkat","d":"Definisi Lengkap","q":"Dalil Al-Quran","h":"Hadits Terkait","u":"Pendapat Ulama","r":"Referensi Kitab"},{"id":128,"n":"Nafs","a":"النفس","k":"Tasawuf","s":"Jiwa manusia","d":"Unsur dalam diri manusia yang menjadi medan perjuangan spiritual.","q":"QS. Yusuf 12:53","h":"HR. Muslim","u":"Nafs harus dididik melalui mujahadah.","r":"Ihya Ulumuddin"},{"id":129,"n":"Nafs Ammarah","a":"النفس الأمارة","k":"Tasawuf","s":"Jiwa yang memerintah keburukan","d":"Tingkatan nafs yang cenderung mengajak kepada maksiat.","q":"QS. Yusuf 12:53","h":"HR. Muslim","u":"Tingkatan nafs terendah.","r":"Ihya Ulumuddin"},{"id":130,"n":"Nafs Lawwamah","a":"النفس اللوامة" ia yang mencapai kesempurnaan akhlak dan makrifat.","q":"QS. Al-Ahzab 33:21","h":"HR. Bukhari","u":"Rasulullah ﷺ adalah Insan Kamil tertinggi.","r":"Al-Insan Al-Kamil"},{"id":147,"n":"Martabat Tujuh","a":"المراتب السبع","k":"Hakikat","s":"Tujuh tingkatan manifestasi","d":"Konsep tasawuf falsafi tentang tingkatan wujud.","q":"QS. An-Nur 24:35","h":"HR. Muslim","u":"Dibahas dalam tradisi tasawuf Nusantara.","r":"Tuhfah Al-Mursalah"},{"id":148,"n":"Wahdatul Wujud","a":"وحدة الوجود","k":"Hakikat","s":"Kesatuan wujud","d":"Konsep metafisik yang menjelaskan hubungan makhluk dengan pencipta secara filosofis.","q":"QS. Al-Hadid 57:3","h":"HR. Muslim","u":"Dikembangkan oleh Ibn Arabi.","r":"Fushush Al-Hikam"},{"id":149,"n":"Wahdatusy Syuhud","a":"وحدة الشهود","k":"Hakikat","s":"Kesatuan penyaksian","d":"Kesatuan dalam pengalaman spiritual tanpa menghapus perbedaan hakiki makhluk dan Tuhan.","q":"QS. Fussilat 41:53","h":"HR. Muslim","u":"Ditekankan oleh Imam Rabbani.","r":"Maktubat"},{"id":150,"n":"Tajalli Af'al","a":"تجلي الأفعال","k":"Hakikat","s":"Penyingkapan perbuatan Allah","d":"Kesadaran bahwa seluruh kejadian berada dalam kehendak Allah.","q":"QS. Al-Anfal 8:17","h":"HR. Muslim","u":"Tahap awal tajalli.","r":"Al-Hikam"},{"id":151,"n":"Tajalli Asma","a":"تجلي الأسماء","k":"Hakikat","s":"Penyingkapan nama-nama Allah","d":"Manifestasi pemahaman terhadap Asmaul Husna dalam hati.","q":"QS. Al-A'raf 7:180","h":"HR. Muslim","u":"Membentuk akhlak rabbani.","r":"Al-Maqsad Al-Asna"},{"id":152,"n":"Tajalli Sifat","a":"تجلي الصفات","k":"Hakikat","s":"Penyingkapan sifat-sifat Allah","d":"Kesadaran terhadap kesempurnaan sifat-sifat Allah.","q":"QS. Al-Hasyr 59:22-24","h":"HR. Muslim","u":"Tahap lanjut perjalanan makrifat.","r":"Ihya Ulumuddin"},{"id":153,"n":"Tajalli Dzat","a":"تجلي الذات","k":"Hakikat","s":"Penyingkapan ketuhanan","d":"Istilah tasawuf untuk pengalaman makrifat tertinggi yang tetap dalam batas syariat.","q":"QS. Al-A'raf 7:143","h":"HR. Muslim","u":"Tidak dapat dij ridin"},{"id":195,"n":"Ta'zhim","a":"التعظيم","k":"Akhlak","s":"Mengagungkan","d":"Menghormati guru, ilmu, dan syiar agama secara proporsional.","q":"QS. Al-Hajj 22:32","h":"HR. Bukhari","u":"Mengagungkan syiar termasuk ketakwaan hati.","r":"Ihya Ulumuddin"},{"id":196,"n":"Ihtiram","a":"الاحترام","k":"Akhlak","s":"Menghormati","d":"Memberikan penghargaan kepada sesama sesuai kedudukannya.","q":"QS. Al-Isra 17:23","h":"HR. Muslim","u":"Adab adalah mahkota ilmu.","r":"Bidayatul Hidayah"},{"id":197,"n":"Khudhu'","a":"الخضوع","k":"Akhlak","s":"Tunduk","d":"Kerendahan hati di hadapan Allah dan kebenaran.","q":"QS. Al-Hadid 57:16","h":"HR. Muslim","u":"Khudhu' adalah buah makrifat.","r":"Ihya Ulumuddin"},{"id":198,"n":"Inkisar","a":"الانكسار","k":"Akhlak","s":"Hancurnya kesombongan","d":"Keadaan hati yang merasa lemah dan membutuhkan Allah.","q":"QS. Fatir 35:15","h":"HR. Muslim","u":"Hati yang patah dekat dengan rahmat Allah.","r":"Al-Hikam"},{"id":199,"n":"Tawajjuh Ilal Mursyid","a":"التوجه إلى المرشد","k":"Tarekat","s":"Menghadap guru","d":"Memusatkan perhatian kepada bimbingan mursyid dalam suluk.","q":"QS. Al-Kahfi 18:66","h":"HR. Muslim","u":"Murid wajib mengambil manfaat dari gurunya.","r":"Risalah Al-Qusyairiyah"},{"id":200,"n":"Husnuzhan bil Mursyid","a":"حسن الظن بالمرشد","k":"Tarekat","s":"Berbaik sangka kepada guru","d":"Menjaga prasangka baik terhadap pembimbing ruhani.","q":"QS. Al-Hujurat 49:12","h":"HR. Muslim","u":"Su'uzan menghalangi keberkahan.","r":"Adab Al-Muridin"},{"id":201,"n":"Khidmah Ikhwan","a":"خدمة الإخوان","k":"Akhlak","s":"Melayani saudara","d":"Membantu sesama salik dengan ikhlas.","q":"QS. Al-Maidah 5:2","h":"HR. Muslim","u":"Pelayanan adalah kemuliaan.","r":"Ihya Ulumuddin"},{"id":202,"n":"Suhbah Shalihin","a":"صحبة الصالحين","k":"Tarekat","s":"Bersama orang saleh","d":"Menemani orang saleh agar memperoleh manfaat ruhani.","q":"QS. At-Taubah 9:119","h":"HR. Bukhari","u":"Sohbah mempercepat perbaikan hati.","r":"Risalah Al-Qusyairiyah"},{" lah satu hikmah terkenal dalam Al-Hikam.","referensi":[{"kitab":"Al-Hikam","penulis":"Ibnu Athaillah"}],"status_sumber":"Primer"},{"id":1023,"slug":"abu-yazid-al-bustami-hijab","nama_tokoh":"Abu Yazid al-Bustami","nama_arab":"أبو يزيد البسطامي","gelar":"Imam Arifin","generasi":"Imam Tasawuf","wafat_h":"261 H","tema":["Makrifat"],"judul":"Hijab Terbesar","teks_arab":"","terjemahan":"Hijab terbesar antara engkau dan Allah adalah dirimu sendiri.","penjelasan":"Ungkapan yang terkenal dalam literatur tasawuf mengenai perjuangan melawan hawa nafsu.","referensi":[{"kitab":"Al-Risalah al-Qushayriyyah"},{"kitab":"Kashf al-Mahjub"}],"status_sumber":"Klasik (redaksi bervariasi)"},{"id":1024,"slug":"abu-madyan-adab","nama_tokoh":"Abu Madyan","nama_arab":"أبو مدين","gelar":"Syaikh al-Maghrib","generasi":"Imam Tasawuf","wafat_h":"594 H","tema":["Adab"],"judul":"Adab Jalan Ruhani","teks_arab":"","terjemahan":"Tidak ada perjalanan menuju Allah tanpa adab.","penjelasan":"Merangkum penekanan Abu Madyan terhadap pentingnya adab dalam suluk.","referensi":[{"kitab":"Manaqib Abu Madyan"}],"status_sumber":"Parafrasa Ajaran"},{"id":1025,"slug":"imam-nawawi-ikhlas","nama_tokoh":"Imam An-Nawawi","nama_arab":"الإمام النووي","gelar":"Muhyiddin","generasi":"Ulama Hadis","wafat_h":"676 H","tema":["Ikhlas"],"judul":"Niat yang Benar","teks_arab":"","terjemahan":"Semua amal bergantung kepada niat yang ikhlas karena Allah.","penjelasan":"Penegasan Imam Nawawi ketika membuka Arba'in dengan hadis niat.","referensi":[{"kitab":"Al-Arba'in An-Nawawiyyah"}],"status_sumber":"Primer"},{"id":1026,"slug":"imam-syadzili-tawakal","nama_tokoh":"Abu al-Hasan asy-Syadzili","nama_arab":"أبو الحسن الشاذلي","gelar":"Pendiri Tarekat Syadziliyah","generasi":"Imam Tasawuf","wafat_h":"656 H","tema":["Tawakal"],"judul":"Sandarkan Hati kepada Allah","teks_arab":"","terjemahan":"Sandarkan hatimu kepada Allah, namun jangan tinggalkan ikhtiar yang benar.","penjelasan":"Merangkum prinsip tawakal dalam ajaran Syadziliyah.","referensi":[{"kitab":"Latha'if al-Minan"}],"status_sumber":"Parafrasa Ajaran"},{"id":1027,"slug":"ahmad-ar-rifai-akhlak","nama_tokoh":"Ahmad ar-Rifa'i","nama_arab":"أحمد الرفاعي","gelar":"Pendiri Tarekat Rifa'iyah","generasi":"Imam Tasawuf","wafat_h":"578 H","tema":["Akhlak"],"judul":"Kemuliaan Akhlak","teks_arab":"","terjemahan":"Kemuliaan seorang salik tampak dari akhlaknya kepada Allah dan kepada manusia.","penjelasan":"Merangkum ajaran akhlak dalam tarekat Rifa'iyah.","referensi":[{"kitab":"Al-Burhan al-Mu'ayyad"}],"status_sumber":"Parafrasa Ajaran"},{"id":1028,"slug":"syekh-yusuf-makassar-mujahadah","nama_tokoh":"Syekh Yusuf al-Makassari","nama_arab":"الشيخ يوسف المكاوي","gelar":"Taj al-Khalwati","generasi":"Ulama Nusantara","wafat_h":"1111 H","tema":["Mujahadah"],"judul":"Perjuangan Melawan Nafsu","teks_arab":"","terjemahan":"Jalan menuju kedekatan dengan Allah ditempuh melalui mujahadah dan penyucian jiwa.","penjelasan":"Merangkum ajaran tazkiyatun nafs dalam karya-karya Syekh Yusuf.","referensi":[{"kitab":"Zubdat al-Asrar"}],"status_sumber":"Parafrasa Ajaran"},{"id":1029,"slug":"syekh-nawawi-bantani-adab","nama_tokoh":"Syekh Nawawi al-Bantani","nama_arab":"محمد نووي البنتني","gelar":"Sayyid Ulama Hijaz","generasi":"Ulama Nusantara","wafat_h":"1314 H","tema":["Adab","Ilmu"],"judul":"Adab Penuntut Ilmu","teks_arab":"","terjemahan":"Ilmu akan membawa keberkahan apabila disertai adab kepada Allah, guru, dan sesama manusia.","penjelasan":"Merangkum penjelasan Syekh Nawawi dalam karya-karya akhlak dan pendidikan.","referensi":[{"kitab":"Nasha'ih al-'Ibad"}],"status_sumber":"Parafrasa Ajaran"},{"id":1030,"slug":"ahmad-khatib-sambas-syariat","nama_tokoh":"Syekh Ahmad Khatib Sambas","nama_arab":"أحمد خطيب السنباسي","gelar":"Pendiri Tarekat Qadiriyah wa Naqsyabandiyah","generasi":"Ulama Nusantara","wafat_h":"1289 H","tema":["Syariat","Tasawuf"],"judul":"Syariat dan Hakikat","teks_arab":"","terjemahan":"Syariat merupakan dasar perjalanan menuju hakikat dan ma'rifat.","penjelasan":"Merangkum prinsip yang diajarkan dalam tradisi Tarekat Qadiriyah wa Naqsyabandiyah.","referensi":[{"kitab":"Literatur TQN dan manaqib Syekh Ahmad Khatib Sambas"}],"status_sumber":"Parafrasa Ajaran"}],

  dzikir: [
    {id:1, n:"Tahlil", a:"لَا إِلٰهَ إِلَّا اللّٰهُ", arti:"Tiada Tuhan selain Allah", waktu:"Kapan saja, dianjurkan pagi & petang", jumlah:"Sebanyak-banyaknya", keutamaan:"Kalimat tauhid yang menjadi inti seluruh dzikir; menegaskan keesaan Allah dan menjadi kunci ucapan seorang muslim.", dalil:"QS. Muhammad (47): 19"},
    {id:2, n:"Tasbih", a:"سُبْحَانَ اللّٰهِ", arti:"Maha Suci Allah", waktu:"Setelah shalat fardhu", jumlah:"33 kali", keutamaan:"Mensucikan Allah dari segala sifat kekurangan; bagian dari dzikir ba'da shalat yang diajarkan Rasulullah SAW.", dalil:"HR. Muslim"},
    {id:3, n:"Tahmid", a:"اَلْحَمْدُ لِلّٰهِ", arti:"Segala puji bagi Allah", waktu:"Setelah shalat fardhu", jumlah:"33 kali", keutamaan:"Ungkapan syukur atas segala nikmat, melengkapi rangkaian tasbih dan takbir.", dalil:"HR. Muslim"},
    {id:4, n:"Takbir", a:"اَللّٰهُ أَكْبَرُ", arti:"Allah Maha Besar", waktu:"Setelah shalat fardhu", jumlah:"34 kali (genap 100 bersama tasbih & tahmid)", keutamaan:"Mengagungkan Allah di atas segala sesuatu; menutup rangkaian dzikir ba'da shalat.", dalil:"HR. Muslim"},
    {id:5, n:"Istighfar", a:"أَسْتَغْفِرُ اللّٰهَ الْعَظِيْمَ", arti:"Aku memohon ampun kepada Allah Yang Maha Agung", waktu:"Pagi, petang, dan setiap selesai majelis", jumlah:"Dianjurkan diperbanyak, minimal 100 kali sehari", keutamaan:"Membersihkan hati, menghapus dosa, dan menjadi kebiasaan Rasulullah SAW meski beliau maksum.", dalil:"HR. Bukhari"},
    {id:6, n:"Hauqalah", a:"لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللّٰهِ", arti:"Tiada daya dan kekuatan kecuali dengan izin Allah", waktu:"Saat menghadapi kesulitan atau musibah", jumlah:"Sesuai kebutuhan", keutamaan:"Disebut sebagai salah satu simpanan surga (kanzun min kunuzil jannah) dalam hadits.", dalil:"HR. Bukhari-Muslim"},
    {id:7, n:"Hasbunallah", a:"حَسْبُنَا اللّٰهُ وَنِعْمَ الْوَكِيْلُ", arti:"Cukuplah Allah bagi kami, dan Dia sebaik-baik Pelindung", waktu:"Saat menghadapi ketakutan atau kesulitan besar", jumlah:"Sesuai kebutuhan, dalam tradisi tarekat kadang dibaca ratusan kali sebagai pembuka hizib", keutamaan:"Ungkapan tawakal penuh yang diucapkan Nabi Ibrahim AS ketika dilemparkan ke dalam api.", dalil:"QS. Ali Imran (3): 173"},
    {id:8, n:"Salawat Nabi", a:"اَللّٰهُمَّ صَلِّ عَلٰى مُحَمَّدٍ", arti:"Ya Allah, limpahkan shalawat kepada Nabi Muhammad", waktu:"Kapan saja, dianjurkan diperbanyak pada malam & hari Jumat", jumlah:"Sebanyak-banyaknya", keutamaan:"Setiap satu shalawat dibalas sepuluh shalawat dari Allah kepada pembacanya.", dalil:"HR. Muslim"},
    {id:9, n:"Ayat Kursi", a:"اٰيَةُ الْكُرْسِيِّ", arti:"QS. Al-Baqarah (2): 255 — tentang keagungan dan kekuasaan Allah", waktu:"Setelah shalat fardhu dan sebelum tidur", jumlah:"1 kali", keutamaan:"Ayat paling agung dalam Al-Qur'an; dibaca sebagai bentuk penjagaan diri (hifzh).", dalil:"QS. Al-Baqarah (2): 255"},
    {id:10, n:"Ya Latif", a:"يَا لَطِيْفُ", arti:"Wahai Yang Maha Lembut", waktu:"Rutin dalam wirid harian tarekat", jumlah:"Sesuai ijazah mursyid, umumnya 100–1000 kali", keutamaan:"Termasuk Asma'ul Husna yang diamalkan salik untuk memohon kelembutan dan jalan keluar dari kesulitan.", dalil:"QS. Al-Mulk (67): 14"},
    {id:11, n:"Ratib Al-Haddad", a:"رَاتِبُ الْحَدَّاد", arti:"Rangkaian dzikir susunan Habib Abdullah bin Alwi Al-Haddad", waktu:"Ba'da Maghrib atau Isya, umumnya berjamaah", jumlah:"Satu rangkaian penuh", keutamaan:"Disusun oleh Al-Habib Abdullah bin Alwi Al-Haddad (w. 1132 H); sangat populer di Nusantara sebagai wirid harian keluarga dan majelis.", dalil:"Ijazah turun-temurun ulama Ba'alawi"},
    {id:12, n:"Wirid Al-Fatih", a:"وِرْدُ صَلَاةِ الْفَاتِحِ", arti:"Shalawat pembuka susunan Tarekat Tijaniyah", waktu:"Rutin harian bagi pengikut Tarekat Tijaniyah", jumlah:"Sesuai ijazah mursyid", keutamaan:"Wirid utama dalam Tarekat Tijaniyah yang diamalkan dengan sanad dan izin (ijazah) khusus dari mursyid.", dalil:"Silsilah Tarekat Tijaniyah"}
  ],

  hizib: [
    {id:1, n:"Hizib Nashar", a:"حِزْبُ النَّصْرِ", makna:"Pertolongan / Kemenangan", penyusun:"Imam Abu Hasan Asy-Syadzili (w. 656 H)", asal:"Pendiri Tarekat Syadziliyah, Mesir", keutamaan:"Diamalkan untuk memohon pertolongan Allah serta perlindungan dari gangguan musuh, baik yang tampak (manusia) maupun yang tidak tampak (jin dan gangguan batin).", tatacara:"Umumnya didahului dengan membaca kalimat Hasbunallahu wa Ni'mal Wakil dalam jumlah tertentu sebelum membaca hizib, dengan adab kekhusyukan dan tawadhu.", catatan:"Terdapat pula varian yang diadaptasi oleh Habib Abdullah bin Alwi Al-Haddad, yang lebih dikenal di Indonesia."},
    {id:2, n:"Hizib Bahar", a:"حِزْبُ الْبَحْرِ", makna:"Hizib Laut / Litani Laut", penyusun:"Imam Abu Hasan Asy-Syadzili (w. 656 H)", asal:"Diriwayatkan diterima langsung dari Rasulullah SAW saat penyusunnya menyeberangi Laut Merah menuju haji", keutamaan:"Salah satu hizib paling masyhur dalam tradisi tarekat; diyakini memberi ketenangan, keselamatan dalam perjalanan, dan perlindungan dari marabahaya.", tatacara:"Dibaca dengan menjaga adab dzikir, bertawasul kepada penyusunnya, dan sebaiknya diijazahkan langsung oleh guru yang memiliki sanad.", catatan:"Juga dikenal dengan nama Al-Hizib Ash-Shaghir (hizib kecil)."},
    {id:3, n:"Hizib Barr", a:"حِزْبُ الْبَرِّ", makna:"Hizib Darat", penyusun:"Imam Abu Hasan Asy-Syadzili", asal:"Mesir, tarekat Syadziliyah", keutamaan:"Dipandang sebagai pasangan dari Hizib Bahar, diamalkan untuk memohon keselamatan dan penjagaan dalam perjalanan maupun urusan di darat.", tatacara:"Diamalkan dengan sanad dan ijazah dari guru tarekat, sebagaimana hizib-hizib Syadziliyah lainnya.", catatan:"Kurang begitu populer dibanding Hizib Bahar, namun tetap diajarkan dalam sebagian silsilah Syadziliyah."},
    {id:4, n:"Hizib Nur", a:"حِزْبُ النُّورِ", makna:"Hizib Cahaya", penyusun:"Imam Abu Hasan Asy-Syadzili", asal:"Mesir, tarekat Syadziliyah", keutamaan:"Berisi permohonan cahaya (nur) petunjuk, keterbukaan hati, dan kejernihan batin bagi pembacanya.", tatacara:"Diamalkan sebagai wirid tambahan bagi pengikut tarekat yang telah mendapat ijazah.", catatan:"Termasuk dalam kumpulan hizib peninggalan Imam Asy-Syadzili bersama Hizib Bahar, Barr, Nashar, dan lainnya."},
    {id:5, n:"Hizib Tawasul", a:"حِزْبُ التَّوَسُّلِ", makna:"Hizib Perantara Doa", penyusun:"Imam Abu Hasan Asy-Syadzili", asal:"Mesir, tarekat Syadziliyah", keutamaan:"Berisi rangkaian tawasul kepada Allah melalui asma dan sifat-sifat-Nya, memohon dikabulkannya hajat.", tatacara:"Dibaca dengan menghadirkan hajat dalam hati sembari menjaga kekhusyukan.", catatan:"Bagian dari kumpulan hizib Syadziliyah yang diwariskan secara bersanad."},
    {id:6, n:"Hizib Adiyat", a:"حِزْبُ الْعَادِيَاتِ", makna:"Diambil dari nama Surat Al-'Adiyat", penyusun:"Imam Abu Hasan Asy-Syadzili", asal:"Mesir, tarekat Syadziliyah", keutamaan:"Sering dikaitkan dengan permohonan keteguhan hati dan pertolongan dalam menghadapi kesulitan besar.", tatacara:"Diamalkan dengan ijazah dan sanad yang jelas dari guru tarekat.", catatan:"Salah satu dari tujuh hizib utama yang dinisbatkan pada Imam Asy-Syadzili."},
    {id:7, n:"Ratib Al-Haddad", a:"رَاتِبُ الْحَدَّاد", makna:"Rangkaian wirid susunan Al-Haddad", penyusun:"Habib Abdullah bin Alwi Al-Haddad (w. 1132 H)", asal:"Hadhramaut, Yaman — ulama besar keturunan Ba'alawi", keutamaan:"Rangkaian dzikir, ayat, dan doa harian yang ringkas namun padat makna; sangat populer di kalangan Nahdliyin dan komunitas Alawiyyin di Nusantara.", tatacara:"Dibaca rutin setiap ba'da Maghrib atau Isya, umumnya secara berjamaah di masjid atau majelis taklim.", catatan:"Termasuk kategori ratib, sedikit berbeda dari hizib namun sering disandingkan karena fungsinya sebagai wirid rutin."},
    {id:8, n:"Ratib Al-Attas", a:"رَاتِبُ الْعَطَّاس", makna:"Rangkaian wirid susunan Al-Attas", penyusun:"Habib Umar bin Abdurrahman Al-Attas", asal:"Hadhramaut, Yaman", keutamaan:"Rangkaian wirid serupa Ratib Al-Haddad, diamalkan sebagai dzikir rutin harian oleh para pengikutnya.", tatacara:"Dibaca rutin, umumnya pada waktu tertentu sesuai tradisi majelis setempat.", catatan:"Populer di kalangan komunitas Alawiyyin, khususnya di sebagian wilayah Indonesia dan Malaysia."}
  ],

  qasidah: [
    {id:1, n:"Qasidah Burdah", judul_asli:"Al-Kawakib Ad-Durriyyah fi Madhi Khairil Bariyyah", penulis:"Imam Al-Bushiri (610–695 H)", asal:"Mesir", tema:"Pujian kepada Nabi Muhammad SAW", tentang:"Terdiri dari sekitar 160 bait yang memuat kisah kelahiran Nabi, nasab, mukjizat, peristiwa Isra Mi'raj, keutamaan Al-Qur'an, hingga munajat dan permohonan syafaat. Qasidah ini konon disusun ketika Al-Bushiri mengalami sakit lumpuh dan bermimpi bertemu Rasulullah SAW."},
    {id:2, n:"Nahjul Burdah", judul_asli:"Nahjul Burdah", penulis:"Ahmad Syauqi (w. 1932 M)", asal:"Mesir (era modern)", tema:"Pujian kepada Nabi Muhammad SAW", tentang:"Ditulis terinspirasi oleh Qasidah Burdah karya Al-Bushiri, namun dengan gaya bahasa Arab modern. Ahmad Syauqi dikenal sebagai salah satu penyair besar Mesir abad ke-20, dijuluki 'Amir Asy-Syu'ara' (Pangeran Para Penyair)."},
    {id:3, n:"Qasidah Hamziyyah", judul_asli:"Al-Kawakib Al-Hamziyyah", penulis:"Imam Al-Bushiri", asal:"Mesir", tema:"Pujian kepada Nabi Muhammad SAW", tentang:"Bersajak dengan huruf akhir hamzah, berisi kisah kelahiran dan perjalanan hidup Nabi. Kurang sepopuler Qasidah Burdah, namun tetap menjadi rujukan dalam sastra pujian Nabi (madh)."},
    {id:4, n:"Simtud Durar", judul_asli:"Simtud Durar fi Akhbari Maulidi Khairil Basyar", penulis:"Habib Ali bin Muhammad Al-Habsyi (w. 1333 H)", asal:"Yaman (Seiyun, Hadhramaut)", tema:"Riwayat kelahiran dan sirah Nabi Muhammad SAW", tentang:"Salah satu teks maulid yang paling populer dibacakan dalam peringatan Maulid Nabi di Indonesia, khususnya di kalangan Nahdliyin dan komunitas Alawiyyin, biasa dilantunkan bersama rebana atau hadrah."},
    {id:5, n:"Maulid Al-Barzanji", judul_asli:"'Iqd Al-Jawahir", penulis:"Syekh Ja'far bin Hasan Al-Barzanji (w. 1177 H)", asal:"Madinah", tema:"Kisah kelahiran dan kehidupan Nabi Muhammad SAW", tentang:"Salah satu teks maulid tertua dan paling tersebar di Nusantara, ditulis dalam bentuk prosa berirama (natsr musajja'). Umum dibaca dalam acara maulid, pernikahan, dan aqiqah di pesantren tradisional."},
    {id:6, n:"Maulid Ad-Diba'i", judul_asli:"Al-Maulid An-Nabawi", penulis:"Syekh Abdurrahman Ad-Diba'i (w. 944 H)", asal:"Zabid, Yaman", tema:"Riwayat kelahiran dan sirah Nabi Muhammad SAW", tentang:"Salah satu teks maulid klasik yang banyak dibaca di pesantren-pesantren tradisional Nusantara sebagai bagian dari perayaan Maulid Nabi."},
    {id:7, n:"Tala'al Badru 'Alayna", judul_asli:"Tala'al Badru 'Alayna", penulis:"Dinisbatkan pada penduduk Madinah (Anshar)", asal:"Madinah", tema:"Penyambutan hijrah Nabi Muhammad SAW", tentang:"Menurut riwayat yang populer di kalangan ulama, syair ini dilantunkan oleh penduduk Madinah untuk menyambut kedatangan Nabi saat hijrah. Kini lazim dilantunkan dalam acara penyambutan dan peringatan maulid."},
    {id:8, n:"Ya Rasulallah", judul_asli:"Ya Rasulallah Ya Habiballah", penulis:"Tradisi lisan majelis shalawat Nusantara", asal:"Indonesia", tema:"Pujian dan kerinduan kepada Nabi Muhammad SAW", tentang:"Nasyid pujian yang sangat populer dilantunkan dalam majelis-majelis shalawat di Indonesia, biasa dibawakan bersama rebana atau hadrah dalam suasana penuh kerinduan kepada Rasulullah SAW."}

  artikel: [
    {id:1, judul:"Mengenal Ilmu Tasawuf: Pengantar bagi Pemula", kategori:"Pengantar", ringkasan:"Apa sebenarnya tasawuf itu, dari mana asal-usulnya, dan mengapa ia menjadi salah satu cabang ilmu keislaman yang penting?",
      isi:"Tasawuf secara sederhana dapat dipahami sebagai ilmu yang berfokus pada penyucian jiwa (tazkiyatun nafs) dan pendekatan diri kepada Allah. Jika ilmu fikih membahas keabsahan lahiriah suatu ibadah, tasawuf hadir untuk menjaga dimensi batin: keikhlasan, kejujuran hati, dan kedekatan spiritual seorang hamba dengan Tuhannya.\n\nSecara historis, praktik-praktik yang kemudian dikenal sebagai tasawuf telah tumbuh sejak masa awal Islam, meneladani kehidupan zuhud para sahabat Nabi. Baru pada abad-abad berikutnya istilah 'tasawuf' mulai dipakai sebagai nama disiplin ilmu tersendiri, dengan tokoh-tokoh besar seperti Hasan Al-Bashri, Rabi'ah Al-Adawiyah, Al-Junaid Al-Baghdadi, hingga Imam Al-Ghazali yang berjasa menyatukan tasawuf dengan syariat secara moderat melalui karya monumentalnya, Ihya' Ulumuddin.\n\nDalam tradisi keilmuan pesantren di Nusantara, tasawuf umumnya diajarkan berdampingan dengan fikih dan akidah, sebagai tiga pilar yang saling melengkapi: fikih menata amal lahir, akidah menata keyakinan, dan tasawuf menata hati. Ketiganya dipahami bukan sebagai hal yang terpisah, melainkan satu kesatuan utuh dalam menjalankan ajaran Islam secara kaffah (menyeluruh)."},
    {id:2, judul:"Empat Tingkatan: Syariat, Tarekat, Hakikat, dan Makrifat", kategori:"Konsep Dasar", ringkasan:"Dalam tradisi tasawuf, perjalanan spiritual seorang salik sering digambarkan melalui empat tingkatan yang saling berkesinambungan.",
      isi:"Para ulama tasawuf kerap menggambarkan perjalanan spiritual dengan empat tingkatan yang saling berkaitan: syariat, tarekat, hakikat, dan makrifat. Ibarat sebuah perjalanan menuju Allah, syariat adalah jalan atau aturan yang harus ditempuh, tarekat adalah cara berjalan di atas jalan itu, hakikat adalah kondisi batin ketika sampai pada tujuan, dan makrifat adalah puncak pengenalan kepada Allah.\n\nSyariat mencakup seluruh aturan ibadah dan muamalah yang telah ditetapkan dalam Al-Qur'an dan Sunnah. Tarekat adalah metode dan bimbingan praktis untuk menjalankan syariat tersebut secara konsisten dan penuh kesungguhan, biasanya di bawah bimbingan seorang guru (mursyid). Hakikat merujuk pada kondisi batin yang lahir dari konsistensi menjalankan tarekat, di mana seorang salik mulai merasakan kehadiran Allah dalam setiap amalnya. Adapun makrifat adalah tingkatan pengenalan tertinggi, saat hati seorang hamba benar-benar mengenal Allah bukan sekadar dengan ilmu, melainkan dengan penghayatan (dzauq).\n\nPara ulama menegaskan bahwa keempat tingkatan ini tidak boleh dipertentangkan satu sama lain. Justru sebaliknya, hakikat dan makrifat yang benar hanya bisa dicapai melalui syariat yang lurus. Sebagaimana sering diungkapkan dalam kitab-kitab tasawuf klasik, 'siapa yang bertasawuf tanpa berfikih maka ia zindiq, dan siapa yang berfikih tanpa bertasawuf maka ia fasik.'"},
    {id:3, judul:"Adab Murid terhadap Mursyid dalam Tradisi Tarekat", kategori:"Tarekat", ringkasan:"Hubungan antara murid dan mursyid (guru pembimbing spiritual) memiliki adab-adab khusus yang dijaga ketat dalam tradisi tarekat.",
      isi:"Dalam tradisi tarekat, hubungan antara murid dan mursyid bukan sekadar relasi guru-murid biasa, melainkan ikatan spiritual yang diikat melalui baiat (janji setia) dan dijaga dengan adab yang ketat. Mursyid berperan membimbing muridnya menempuh jalan penyucian jiwa, sehingga kepercayaan dan kepatuhan murid terhadap arahan sang guru menjadi pondasi penting dalam proses ini.\n\nBeberapa adab yang umum diajarkan antara lain: berprasangka baik (husnuzhan) kepada mursyid, tidak membantah arahannya tanpa alasan syar'i yang jelas, menjaga rahasia dan kehormatan majelis, serta senantiasa merujuk persoalan batin kepada bimbingannya. Adab ini bukan dimaksudkan untuk mengkultuskan sosok mursyid, melainkan sebagai metode pendisiplinan diri (riyadhah) agar murid benar-benar sungguh-sungguh dalam menempuh jalan spiritualnya.\n\nPenting dicatat, dalam tarekat mu'tabarah (yang diakui sanad keilmuannya), seorang mursyid harus memiliki sanad keguruan yang bersambung hingga Rasulullah SAW. Karenanya, memilih mursyid dan tarekat yang jelas silsilahnya menjadi salah satu hal yang sangat ditekankan para ulama sebelum seseorang mengikat diri dalam sebuah baiat."},
    {id:4, judul:"Maqamat dan Ahwal: Memahami Perjalanan Spiritual Salik", kategori:"Konsep Dasar", ringkasan:"Dua istilah kunci dalam tasawuf yang menggambarkan tahapan dan kondisi batin seorang penempuh jalan spiritual (salik).",
      isi:"Dalam kepustakaan tasawuf klasik, perjalanan seorang salik (penempuh jalan spiritual) sering dipetakan melalui dua konsep: maqam (jamak: maqamat) dan hal (jamak: ahwal). Maqam merujuk pada kedudukan atau tahapan spiritual yang dicapai seorang hamba melalui usaha dan kesungguhan (mujahadah), seperti taubat, zuhud, sabar, tawakal, dan ridha. Karena diperoleh lewat usaha, maqam bersifat relatif tetap dan bisa dipertahankan.\n\nSementara itu, hal adalah kondisi batin yang datang sebagai anugerah dari Allah, bukan hasil usaha semata, dan sifatnya sementara — bisa datang dan pergi. Contohnya adalah rasa syauq (rindu), khauf (takut), raja' (harap), dan bahagia dalam bermunajat. Para ulama menjelaskan bahwa hal ibarat kilatan cahaya yang menerangi hati sesaat, sedangkan maqam ibarat rumah yang dihuni secara menetap.\n\nMeski susunan dan penamaannya berbeda antara satu ulama dengan ulama lain, tujuan dari pembahasan maqamat dan ahwal ini sama: memberi peta bagi para penempuh jalan spiritual agar dapat mengenali posisi dan kondisi batinnya, sekaligus menjadi pengingat bahwa perjalanan menuju Allah adalah proses bertahap yang membutuhkan kesabaran dan bimbingan guru yang tepat."},
    {id:5, judul:"Mengenal Tarekat Mu'tabarah di Indonesia", kategori:"Tarekat", ringkasan:"Apa itu tarekat mu'tabarah, dan mengapa status kemu'tabarahannya penting dalam tradisi tasawuf di Nusantara?",
      isi:"Istilah tarekat mu'tabarah merujuk pada tarekat yang diakui keabsahan sanad dan ajarannya oleh para ulama, karena silsilah keguruannya bersambung secara jelas hingga Rasulullah SAW dan tidak bertentangan dengan syariat. Di Indonesia, organisasi Jam'iyyah Ahlith Thariqah Al-Mu'tabarah An-Nahdliyyah (JATMAN) di bawah naungan Nahdlatul Ulama berperan mendata dan membina tarekat-tarekat yang memenuhi kriteria kemu'tabarahan ini.\n\nDi antara tarekat mu'tabarah yang berkembang luas di Nusantara adalah Tarekat Qadiriyah (dinisbatkan kepada Syekh Abdul Qadir Al-Jilani), Tarekat Naqsyabandiyah, Tarekat Syadziliyah (dinisbatkan kepada Imam Abu Hasan Asy-Syadzili), Tarekat Tijaniyah, hingga gabungan Tarekat Qadiriyah wa Naqsyabandiyah yang sangat populer di pesantren-pesantren besar Jawa.\n\nStatus kemu'tabarahan penting karena menjadi penanda bahwa amalan dan bimbingan spiritual yang diajarkan suatu tarekat dapat dipertanggungjawabkan secara keilmuan, sekaligus menjaga umat dari praktik-praktik yang mengatasnamakan tarekat namun menyimpang dari koridor syariat."},
    {id:6, judul:"Dzikir dan Wirid: Antara Amalan Harian dan Hizib Ijazah", kategori:"Amalan", ringkasan:"Memahami perbedaan mendasar antara dzikir harian yang umum, wirid rutin tarekat, dan hizib yang memerlukan ijazah khusus.",
      isi:"Dalam praktik keseharian umat Islam, kita mengenal berbagai istilah yang berkaitan dengan dzikir: mulai dari tasbih dan tahmid yang dibaca setiap selesai shalat, wirid harian yang dianjurkan pagi-petang, hingga hizib dan ratib yang lebih spesifik dalam tradisi tarekat.\n\nSecara umum, dzikir adalah istilah paling luas yang mencakup segala bentuk mengingat Allah, baik dengan lisan, hati, maupun perbuatan. Wirid biasanya merujuk pada rangkaian dzikir yang dibaca secara rutin pada waktu tertentu, baik individual maupun berjamaah, seperti Ratib Al-Haddad yang populer dibaca ba'da Maghrib. Sementara hizib memiliki kekhususan tersendiri: ia adalah rangkaian doa dan dzikir yang disusun oleh seorang wali atau ulama besar tarekat, umumnya berisi ayat-ayat Al-Qur'an dan doa-doa yang dipilih dengan tujuan spiritual khusus.\n\nBerbeda dengan dzikir harian yang bisa diamalkan siapa saja secara bebas, para ulama menekankan bahwa hizib idealnya diamalkan setelah mendapat ijazah (izin resmi) dari guru yang memiliki sanad yang jelas. Hal ini untuk menjaga adab, kesungguhan niat, serta memastikan pengamalannya sesuai dengan tuntunan yang benar dari sumber aslinya."}
  ]
};
