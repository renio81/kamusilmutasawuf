<script id="appScript">/* ===================== KBIT APP ===================== */
(function(){
"use strict";

const DATA = window.KBIT_DATA || [];
const EXTRA = window.KBIT_EXTRA || {dzikir:[],hizib:[],qasidah:[],artikel:[],wasiat:[],hero_bg:'',hero:{ornament:'',title:'Kamus Besar Ilmu Tasawuf Indonesia',subtitle:'',bg:''}};
const VERSES = window.KBIT_VERSES || {};
function getVerse(ref){
  if(!ref) return null;
  return VERSES[ref.trim()] || null;
}

/* ---- classify entries ---- */
function getTokoh(){ return DATA.filter(d => d.k === 'Tokoh Sufi'); }
function getKitab(){ return DATA.filter(d => d.k === 'Kitab' || d.k === 'Kitab Tasawuf'); }
function getTarekat(){ return DATA.filter(d => d.k === 'Tarekat'); }
function getIstilah(){ return DATA.filter(d => d.k !== 'Tokoh Sufi' && d.k !== 'Kitab' && d.k !== 'Kitab Tasawuf'); }

function getIstilahCats(){ return Array.from(new Set([...getIstilah().map(d => d.k || 'Umum'), ...ADMIN.extraCategories])).sort(); }

/* ---- parse "Nama Ulama: kutipan" pattern from Pendapat Ulama field ---- */
function getWasiat(){ return DATA.filter(d => d.u).map(d => {
  const m = d.u.match(/^([^:]{2,40}):\s*(.+)$/);
  return {
    id: d.id,
    ulama: m ? m[1].trim() : 'Ulama',
    quote: m ? m[2].trim() : d.u,
    istilah: d.n,
    istilahId: d.id
  };
}); }

function getById(id){ return DATA.find(d => d.id === id); }

/* ---- session state (no localStorage per platform rules) ---- */
const state = {
  favorites: new Set(),
  history: [],   // array of ids, most recent first
  query: '',
};

/* ---- admin state (session-only) ---- */
const ADMIN_PASSWORD = 'hu4111';
const ADMIN = {
  authenticated: false,
  menuVisibility: {}, // {navId: boolean}
  activity: [],       // {ts, text}
  nextId: Math.max(0, ...DATA.map(d=>d.id)) + 1,
  nextExtraId: {dzikir: Math.max(0,...EXTRA.dzikir.map(d=>d.id))+1, hizib: Math.max(0,...EXTRA.hizib.map(d=>d.id))+1, qasidah: Math.max(0,...EXTRA.qasidah.map(d=>d.id))+1, artikel: Math.max(0,...EXTRA.artikel.map(d=>d.id))+1, wasiat: Math.max(0,...EXTRA.wasiat.map(d=>d.id))+1},
  originalData: JSON.parse(JSON.stringify(DATA)),
  originalExtra: JSON.parse(JSON.stringify({dzikir:EXTRA.dzikir, hizib:EXTRA.hizib, qasidah:EXTRA.qasidah, artikel:EXTRA.artikel, wasiat:EXTRA.wasiat, hero:EXTRA.hero})),
  extraCategories: [], // categories created via admin before any entry uses them
};
function logActivity(text){
  ADMIN.activity.unshift({ts: new Date(), text});
  if(ADMIN.activity.length>50) ADMIN.activity.pop();
}
function timeAgo(date){
  const s = Math.floor((Date.now()-date.getTime())/1000);
  if(s<60) return 'baru saja';
  if(s<3600) return Math.floor(s/60)+' menit lalu';
  if(s<86400) return Math.floor(s/3600)+' jam lalu';
  return Math.floor(s/86400)+' hari lalu';
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove('show'), 2200);
}

function initials(name){
  return (name||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(text, q){
  if(!q) return escapeHtml(text);
  const esc = escapeHtml(text);
  try{
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    return esc.replace(re, '<mark style="background:var(--gold-100);color:inherit;border-radius:3px;padding:0 1px;">$1</mark>');
  }catch(e){ return esc; }
}

const CAT_ICON_MAP = {
  'Makrifat':'☾','Amalan':'✺','Hakikat':'✦','Akhlak':'❈','Ahwal':'◈','Tasawuf':'۞','Maqamat':'⟡','Kategori':'❖','Tarekat':'⟐'

/* ===================== SIDEBAR RENDER ===================== */
function navCount(id){
  switch(id){
    case 'kamus': return getIstilah().length;
    case 'tokoh': return getTokoh().length;
    case 'kitab': return getKitab().length;
    case 'tarekat': return getTarekat().length;
    case 'dzikir': return EXTRA.dzikir.length;
    case 'hizib': return EXTRA.hizib.length;
    case 'qasidah': return EXTRA.qasidah.length;
    case 'wasiat': return EXTRA.wasiat.length;
    case 'artikel': return EXTRA.artikel.length;
    default: return undefined;
  }
}
function renderSidebar(activeId){
  const navMain = document.getElementById('navMain');
  const navMeta = document.getElementById('navMeta');
  const visibleMain = NAV_MAIN.filter(n => ADMIN.menuVisibility[n.id] !== false);
  navMain.innerHTML = '<div class="nav-label">Menu Utama</div>' + visibleMain.map(n => navItemHtml(n, activeId, navCount(n.id))).join('');
  navMeta.innerHTML = '<div class="nav-label">Personal</div>' + NAV_META.map(n => navItemHtml(n, activeId, n.id==='favorit'?state.favorites.size:(n.id==='riwayat'?state.history.length:null))).join('')
    + `<a href="#/admin" class="nav-item ${activeId==='admin'?'active':''}">${icoLock()}<span>Admin Dashboard</span></a>`;
}
function navItemHtml(n, activeId, countOverride){
  const cnt = countOverride !== undefined && countOverride !== null ? countOverride : n.count;
  return `<a href="${n.route}" class="nav-item ${n.id===activeId?'active':''}">${n.icon()}<span>${n.label}</span>${cnt!==undefined?`<span class="count">${cnt}</span>`:''}</a>`;
}

/* ===================== BREADCRUMB ===================== */
function setCrumb(parts){
  document.getElementById('crumb').innerHTML = parts.map((p,i)=>{
    const last = i===parts.length-1;
    return (i>0?'<span>›</span>':'') + (last ? `<b>${escapeHtml(p.label)}</b>` : `<a href="${p.href}">${escapeHtml(p.label)}</a>`);
  }).join(' ');
}

/* ===================== CARD BUILDERS ===================== */
function entryCard(item, opts){
  opts = opts||{};
  const isFav = state.favorites.has(item.id);
  const catBadge = item.k || 'Umum';
  return `
  <div class="entry-card" data-goto="${opts.route || ('#/istilah/'+item.id)}">
    <div class="ec-top">
      <div>
        <div class="ec-title">${highlight(item.n, opts.q)}</div>
        ${item.a?`<div class="ec-arabic">${escapeHtml(item.a)}</div>`:''}
      </div>
      <button class="fav-btn ${isFav?'active':''}" data-fav="${item.id}" aria-label="Favoritkan" onclick="event.stopPropagation()">
        ${isFav? svg('<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z" fill="currentColor"/>') : svg('<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>')}
      </button>

}

/* ===================== ROUTER ===================== */
function router(){
  const hash = location.hash || '#/beranda';
  const parts = hash.replace(/^#\//,'').split('/');
  const page = parts[0] || 'beranda';
  closeSidebarMobile();
  window.scrollTo({top:0, behavior:'instant' in window ? 'instant':'auto'});

  switch(page){
    case 'beranda': renderSidebar('beranda'); renderBeranda(); break;
    case 'kamus': renderSidebar('kamus'); renderList({items:getIstilah(), key:'kamus', title:'Kamus Tasawuf', subtitle:'Jelajahi istilah-istilah dalam khazanah ilmu tasawuf, lengkap dengan dalil dan penjelasan ulama.', cats:getIstilahCats(), showCats:true}); break;
    case 'tokoh': renderSidebar('tokoh'); renderList({items:getTokoh(), key:'tokoh', title:'Tokoh Sufi', subtitle:'Mengenal para ulama dan wali yang mewariskan ilmu tasawuf dari generasi ke generasi.', isTokoh:true}); break;
    case 'kitab': renderSidebar('kitab'); renderList({items:getKitab(), key:'kitab', title:'Kitab Tasawuf', subtitle:'Rujukan utama dan karya klasik para ulama tasawuf.', isKitab:true}); break;
    case 'tarekat': renderSidebar('tarekat'); renderList({items:getTarekat(), key:'tarekat', title:'Tarekat', subtitle:'Istilah-istilah seputar jalan (tarekat) dan adab hubungan murid-mursyid.'}); break;
    case 'istilah': renderSidebar('kamus'); renderDetail(parts[1], {backRoute:'#/kamus', backLabel:'Kamus Tasawuf'}); break;
    case 'tokohd': renderSidebar('tokoh'); renderDetail(parts[1], {backRoute:'#/tokoh', backLabel:'Tokoh Sufi', isTokoh:true}); break;
    case 'kitabd': renderSidebar('kitab'); renderDetail(parts[1], {backRoute:'#/kitab', backLabel:'Kitab Tasawuf', isKitab:true}); break;
    case 'favorit': renderSidebar('favorit'); renderFavorit(); break;
    case 'riwayat': renderSidebar('riwayat'); renderRiwayat(); break;
    case 'tentang': renderSidebar('tentang'); renderTentang(); break;
    case 'cari': renderSidebar(''); renderSearchResults(decodeURIComponent(parts[1]||'')); break;
    case 'dzikir': renderSidebar('dzikir'); renderDzikirList(); break;
    case 'dzikird': renderSidebar('dzikir'); renderDzikirDetail(parts[1]); break;
    case 'hizib': renderSidebar('hizib'); renderHizibList(); break;
    case 'hizibd': renderSidebar('hizib'); renderHizibDetail(parts[1]); break;
    case 'qasidah': renderSidebar('qasidah'); renderQasidahList(); break;
    case 'qasidahd': renderSidebar('qasidah'); renderQasidahDetail(parts[1]); break;
    case 'wasiat': renderSidebar('wasiat'); renderWasiatList(); break;
    case 'wasiatd': renderSidebar('wasiat'); renderWasiatDetail(parts[1]); break;
    case 'artikel': renderSidebar('artikel'); renderArtikelList(); break;
    case 'artikeld': renderSidebar('artikel'); renderArtikelDetail(parts[1]); break;
    case 'admin':
      document.body.classList.add('admin-mode');
      if(!ADMIN.authenticated){
        renderAdminLogin(hash);
      } else if(parts[1]==='data' && parts[2]){
        if(parts[3]) renderAdminDataForm(parts[2], parts[3]);
        else renderAdminDataList(parts[2]);
      } else if(parts[1]==='hero'){ renderAdminHero(); }
      else if(parts[1]==='kategori'){ renderAdminKategori(); }
      else if(parts[1]==='menu'){ renderAdminMenu(); }
      else if(parts[1]==='pengguna'){ renderAdminPengguna(); }
      else if(parts[1]==='pengaturan'){ renderAdminPengaturan(); }
      else if(parts[1]==='backup'){ renderAdminBackup(); }
      else { renderAdminDashboard(); }
      break;
    default: renderSidebar('beranda'); renderBeranda();
  }
  if(page!=='admin') document.body.classList.remove('admin-mode');
  attachCardEvents();
}

function closeSidebarMobile(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function attachCardEvents(){
  document.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=>{ location.hash = el.getAttribute('data-goto'); });
  });
  document.querySelectorAll('[data-fav]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      const id = Number(el.getAttribute('data-fav'));
      toggleFav(id);
      const active = state.favorites.has(id);
      el.classList.toggle('active', active);
      el.innerHTML = active? svg('<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z" fill="currentColor"/>') : svg('<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>');
      renderSidebar(document.querySelector('.nav-item.active')?.dataset?.id);
    });
  });
}

function toggleFav(id){
  if(state.favorites.has(id)){ state.favorites.delete(id); toast('Dihapus dari favorit'); }
  else { state.favorites.add(id); toast('Ditambahkan ke favorit'); }
}
function pushHistory(id){
  state.history = state.history.filter(x=>x!==id);
  state.history.unshift(id);
  if(state.history.length>40) state.history.pop();
}

/* ===================== LIST PAGE (Kamus / Tokoh / Kitab / Tarekat) ===================== */
let listUiState = {}; // per key: {q, cat, page}

function renderList(opts){
  const key = opts.key;
  if(!listUiState[key]) listUiState[key] = {q:'', cat:'Semua', page:1};
  const ui = listUiState[key];
  const PAGE_SIZE = 12;

  setCrumb([{label:'Beranda',href:'#/beranda'},{label:opts.title}]);

  function filtered(){
    let items = opts.items;
    if(opts.showCats && ui.cat && ui.cat!=='Semua'){
      items = items.filter(d => (d.k||'Umum') === ui.cat);
    }
    if(ui.q){
      const q = ui.q.toLowerCase();
      items = items.filter(d => (d.n+' '+d.s+' '+d.d).toLowerCase().includes(q));
    }
    return items;
  }

  function draw(){
    const items = filtered();
    const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
    ui.page = Math.min(ui.page, totalPages);
    const pageItems = items.slice((ui.page-1)*PAGE_SIZE, ui.page*PAGE_SIZE);

    const routeFor = (item) => opts.isTokoh ? ('#/tokohd/'+item.id) : opts.isKitab ? ('#/kitabd/'+item.id) : ('#/istilah/'+item.id);

    const gridHtml = pageItems.length ? `<div class="card-grid">${pageItems.map(it=>entryCard(it,{q:ui.q, route:routeFor(it), hideBadge:opts.isTokoh||opts.isKitab})).join('')}</div>`
      : `<div class="empty-state"><div class="ei">🔍</div><h3>Tidak ditemukan</h3><p>Coba kata kunci lain atau ubah filter kategori.</p></div>`;

    const pagerHtml = totalPages>1 ? `<div class="pagination">
        <button ${ui.page===1?'disabled':''} data-pg="prev">‹</button>
        ${Array.from({length:totalPages}).map((_,i)=>`<button class="${ui.page===i+1?'active':''}" data-pg="${i+1}">${i+1}</button>`).join('')}
        <button ${ui.page===totalPages?'disabled':''} data-pg="next">›</button>
      </div>` : '';

    document.getElementById('listGrid').innerHTML = gridHtml + pagerHtml;
    document.getElementById('resultCount').textContent = `${items.length.toLocaleString('id-ID')} hasil`;
    attachCardEvents();

    document.querySelectorAll('[data-pg]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const v = b.getAttribute('data-pg');
        if(v==='prev') ui.page = Math.max(1, ui.page-1);
        else if(v==='next') ui.page = Math.min(totalPages, ui.page+1);
        else ui.page = Number(v);
        draw();
        document.getElementById('listGrid').scrollIntoView({behavior:'smooth', block:'start'});
      });
    });
  }

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="page-head">
      <div class="eyebrow">KBIT</div>
      <h1>${escapeHtml(opts.title)}</h1>
      <p>${escapeHtml(opts.subtitle||'')}</p>
    </div>
    <div class="toolbar">
      <div class="search-mini">
        ${svg('<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>')}
        <input id="listSearch" placeholder="Cari di ${escapeHtml(opts.title)}…" value="${escapeHtml(ui.q)}">
      </div>
      <div class="result-count" id="resultCount"></div>
    </div>
    ${opts.showCats ? `<div class="chip-row" id="chipRow">
      <button class="chip ${ui.cat==='Semua'?'active':''}" data-cat="Semua">Semua</button>
      ${opts.cats.map(c=>`<button class="chip ${ui.cat===c?'active':''}" data-cat="${escapeHtml(c)}">${escapeHtml(c)}</button>`).join('')}
    </div>` : ''}
    <div id="listGrid"></div>
  `;

  document.getElementById('listSearch').addEventListener('input', (e)=>{
    ui.q = e.target.value; ui.page = 1; draw();
  });
  if(opts.showCats){
    document.querySelectorAll('[data-cat]').forEach(chip=>{
      chip.addEventListener('click', ()=>{
        ui.cat = chip.getAttribute('data-cat'); ui.page = 1;
        document.querySelectorAll('[data-cat]').forEach(c2=>c2.classList.toggle('active', c2===chip));
        draw();
      });
    });
  }
  draw();
}

function renderDetail(idStr, opts){

  const c = document.getElementById('content');

  pushHistory(id);
  setCrumb([{label:'Beranda',href:'#/beranda'},{label:opts.backLabel,href:opts.backRoute},{label:item.n}]);

  const isFav = state.favorites.has(id);
  const related = DATA.filter(d => d.id!==id && d.k===item.k).slice(0,6);
  const relRoute = (d)=> opts.isTokoh?('#/tokohd/'+d.id):opts.isKitab?('#/kitabd/'+d.id):('#/istilah/'+d.id);

function renderDalilBlock(item){
  const q = (item.q||'').trim();
  // manual admin-entered Arabic/translation takes priority over the verified lookup
  if(item.q_arab || item.q_arti){
    return `<div class="dblock"><h4>Dalil Al-Qur'an</h4>
      <div class="quote-box" style="font-style:normal;">
        ${q?`<div style="font-size:10.5px;font-weight:700;color:var(--gold-600);letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase;">${escapeHtml(q)}</div>`:''}
        ${item.q_arab?`<div class="arabic" style="direction:rtl;font-size:19px;line-height:2;color:var(--ink-900);margin-bottom:10px;">${escapeHtml(item.q_arab)}</div>`:''}
        ${item.q_arti?`<div style="font-size:13.5px;line-height:1.7;color:var(--ink-soft);font-style:italic;">"${escapeHtml(item.q_arti)}"</div>`:''}
      </div></div>`;
  }
  const refs = q.split(/;|,(?=\s*QS)/).map(s=>s.trim()).filter(Boolean);
  const cards = refs.map(ref=>{
    const v = getVerse(ref);
    if(v){
      return `<div class="quote-box" style="font-style:normal;margin-bottom:10px;">
        <div style="font-size:10.5px;font-weight:700;color:var(--gold-600);letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase;">${escapeHtml(ref)}</div>
        <div class="arabic" style="direction:rtl;font-size:19px;line-height:2;color:var(--ink-900);margin-bottom:10px;">${escapeHtml(v.a)}</div>
        <div style="font-size:13.5px;line-height:1.7;color:var(--ink-soft);font-style:italic;">"${escapeHtml(v.t)}"</div>
      </div>`;
    }
    return `<div class="quote-box" style="margin-bottom:10px;">${escapeHtml(ref)}</div>`;
  }).join('');
  return `<div class="dblock"><h4>Dalil Al-Qur'an</h4>${cards}</div>`;
}

function renderHaditsBlock(item){
  const h = (item.h||'').trim();
  if(item.h_arab || item.h_arti){

const WASIAT_GEN_ICON = {'Sahabat':'☾',"Tabi'in":'✦',"Tabi'ut Tabi'in":'✺','Imam Mazhab':'❖','Imam Tasawuf':'⟡','Ulama Tasawuf':'⟐','Ulama Hadis':'✧','Ulama Nusantara':'❈'};
const HIKMAH_PICKS = [1001, 1006, 1008, 1010, 1017, 1019, 1020];

function renderWasiatList(){
  setCrumb([{label:'Beranda',href:'#/beranda'},{label:'Wasiat Ulama'}]);
  const ui = listUiState['wasiat'] || (listUiState['wasiat'] = {tema:'Semua', gen:'Semua'});
  const all = EXTRA.wasiat;
  const temas = Array.from(new Set(all.flatMap(w=>w.tema||[]))).sort();
  const gens = Array.from(new Set(all.map(w=>w.generasi).filter(Boolean)));
  const hikmah = HIKMAH_PICKS.map(id=>all.find(w=>w.id===id)).filter(Boolean);

  function filtered(){
    let items = all;
    if(ui.tema!=='Semua') items = items.filter(w => (w.tema||[]).includes(ui.tema));
    if(ui.gen!=='Semua') items = items.filter(w => w.generasi===ui.gen);
    return items;
  }
  function draw(){
    const items = filtered();
    document.getElementById('wasiatGrid').innerHTML = items.length ? `<div class="card-grid">
      ${items.map(w=>`
        <div class="entry-card" data-goto="#/wasiatd/${w.id}">
          <div class="ec-top">
            <div>
              <div class="ec-title" style="font-size:14.5px;">${escapeHtml(w.nama_tokoh)}</div>
              ${w.nama_arab?`<div class="ec-arabic">${escapeHtml(w.nama_arab)}</div>`:''}
            </div>
          </div>
          <span class="ec-badge">${escapeHtml(w.generasi||'')}</span>
          <div class="ec-desc" style="font-style:italic;-webkit-line-clamp:3;margin-top:10px;">"${escapeHtml(w.terjemahan)}"</div>
        </div>`).join('')}
      </div>` : `<div class="empty-state"><div class="ei">🔍</div><h3>Tidak ditemukan</h3><p>Coba tema atau generasi lain.</p></div>`;
    attachCardEvents();
  }

  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="page-head">
      <div class="eyebrow">KBIT</div>
      <h1>Wasiat Ulama</h1>
      <p>Nasihat dan hikmah dari para sahabat, tabi'in, hingga imam tasawuf — lengkap dengan teks asli dan rujukan kitabnya.</p>
    </div>
    <div class="chip-row">
      <button class="chip active" data-gen="Semua">Semua</button>
      ${gens.map(g=>`<button class="chip" data-gen="${escapeHtml(g)}">${escapeHtml(g)}</button>`).join('')}
    </div>
    <div class="chip-row">
      <button class="chip active" data-tema="Semua">Semua</button>
      ${temas.map(t=>`<button class="chip" data-tema="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join('')}
    </div>
    <div id="wasiatGrid"></div>

    ${hikmah.length?`
    <section class="section">
      <div class="section-head"><h2>Tujuh Kalam Hikmah</h2></div>
      <div class="hikmah-slider" id="hikmahSlider">
        ${hikmah.map((w,i)=>`
          <div class="hikmah-slide ${i===0?'active':''}" data-i="${i}">
            <div class="hikmah-mark">"</div>
            <p class="hikmah-quote">${escapeHtml(w.terjemahan)}</p>
            <div class="hikmah-author">— ${escapeHtml(w.nama_tokoh)}${w.generasi?`, <span>${escapeHtml(w.generasi)}</span>`:''}</div>
          </div>`).join('')}
        <div class="hikmah-dots">
          ${hikmah.map((_,i)=>`<button class="hikmah-dot ${i===0?'active':''}" data-dot="${i}" aria-label="Slide ${i+1}"></button>`).join('')}
        </div>
      </div>
    </section>` : ''}
  `;
  document.querySelectorAll('[data-gen]').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      ui.gen = chip.getAttribute('data-gen');
      chip.parentElement.querySelectorAll('.chip').forEach(c2=>c2.classList.toggle('active', c2===chip));
      draw();
    });
  });
  document.querySelectorAll('[data-tema]').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      ui.tema = chip.getAttribute('data-tema');
      chip.parentElement.querySelectorAll('.chip').forEach(c2=>c2.classList.toggle('active', c2===chip));
      draw();
    });
  });
  draw();

  /* ---- kalam hikmah fade slideshow ---- */
  if(hikmah.length){
    const slider = document.getElementById('hikmahSlider');
    let cur = 0;
    let timer = null;
    function goTo(idx){
      const slides = slider.querySelectorAll('.hikmah-slide');
      const dots = slider.querySelectorAll('.hikmah-dot');
      slides.forEach((s,i)=>s.classList.toggle('active', i===idx));
      dots.forEach((d,i)=>d.classList.toggle('active', i===idx));
      cur = idx;
    }
    function next(){ goTo((cur+1) % hikmah.length); }
    function startAuto(){ clearInterval(timer); timer = setInterval(next, 5000); }
    slider.querySelectorAll('.hikmah-dot').forEach(dot=>{
      dot.addEventListener('click', ()=>{ goTo(Number(dot.getAttribute('data-dot'))); startAuto(); });
    });
    startAuto();
  }
}

function titleFieldOf(type){
  if(type==='artikel') return 'judul';
  if(type==='wasiat') return 'judul';
  return 'n';
}
function subFieldOf(type){
  const cfg = TYPE_CONFIG[type];
  if(type==='artikel') return 'ringkasan';
  if(type==='hizib') return 'keutamaan';
  if(type==='qasidah') return 'tentang';
  if(type==='wasiat') return 'terjemahan';
  return cfg.fields.some(f=>f.key==='s') ? 's' : (cfg.fields[1] ? cfg.fields[1].key : null);
}

/* ---- CRUD helpers ---- */
function adminAddItem(type, values){
  const cfg = TYPE_CONFIG[type];
  if(cfg.source==='data'){
    const item = {id: ADMIN.nextId++, n:'', a:'', k: cfg.fixedK || (values.k||'Umum'), s:'', d:'', q:'', q_arab:'', q_arti:'', h:'', h_arab:'', h_arti:'', u:'', r:''};
    Object.assign(item, values);
    if(cfg.fixedK) item.k = cfg.fixedK;
    DATA.push(item);
    logActivity(`${cfg.singular} baru ditambahkan: ${item.n}`);
    return item;
  } else {
    const item = {id: ADMIN.nextExtraId[cfg.extraKey]++};
    Object.assign(item, values);
    EXTRA[cfg.extraKey].push(item);
    logActivity(`${cfg.singular} baru ditambahkan: ${item[titleFieldOf(type)]||''}`);
    return item;
  }
}
function adminUpdateItem(type, id, values){
  const cfg = TYPE_CONFIG[type];
  const arr = cfg.source==='data' ? DATA : EXTRA[cfg.extraKey];
  const item = arr.find(x=>x.id===id);
  if(!item) return null;
  Object.assign(item, values);
  if(cfg.fixedK) item.k = cfg.fixedK;
  logActivity(`${cfg.singular} diperbarui: ${item[titleFieldOf(type)]||''}`);
  return item;
}
function adminDeleteItem(type, id){
  const cfg = TYPE_CONFIG[type];
  if(cfg.source==='data'){
    const idx = DATA.findIndex(x=>x.id===id);
    if(idx>-1){ const nm = DATA[idx].n; DATA.splice(idx,1); logActivity(`${cfg.singular} dihapus: ${nm}`); }
  } else {
    const arr = EXTRA[cfg.extraKey];
    const idx = arr.findIndex(x=>x.id===id);
    if(idx>-1){ const nm = arr[idx][titleFieldOf(type)]; arr.splice(idx,1); logActivity(`${cfg.singular} dihapus: ${nm||''}`); }
  }
}

/* ---- confirm modal (avoid relying on window.confirm in sandboxed iframe) ---- */
function showConfirm(title, msg, onYes){
  let overlay = document.getElementById('confirmModal');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'confirmModal';
    overlay.className = 'modal-overlay';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="mi">${svg('<path d="M5 7h14M9.5 7V4.8c0-.7.6-1.3 1.3-1.3h2.4c.7 0 1.3.6 1.3 1.3V7M7 7l1 12.3c0 .9.8 1.7 1.7 1.7h4.6c.9 0 1.7-.8 1.7-1.7L17 7"/>')}</div>
      <h3>${escapeHtml(title)}</h3>
      <p>${escapeHtml(msg)}</p>
      <div class="modal-actions">
        <button class="btn" id="cmCancel">Batal</button>
        <button class="btn btn-danger" id="cmYes" style="background:var(--maroon);color:#fff;border-color:var(--maroon);">Hapus</button>
      </div>
    </div>`;
  requestAnimationFrame(()=>overlay.classList.add('show'));
  function close(){ overlay.classList.remove('show'); }
  overlay.querySelector('#cmCancel').onclick = close;
  overlay.querySelector('#cmYes').onclick = ()=>{ onYes(); close(); };
  overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
}

function adminStat(n,l){ return `<div class="admin-stat"><div class="n">${n.toLocaleString('id-ID')}</div><div class="l">${l}</div></div>`; }

function doBackupDownload(){
  const payload = {exported_at: new Date().toISOString(), data: DATA, extra: EXTRA};
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kbit-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  logActivity('Backup data diunduh');
  toast('Backup berhasil diunduh');
}

function renderCsvImportBlock(type){
  const conf = CSV_IMPORT_CONFIG[type];
  if(!conf) return '';
  const delim = conf.delimiter || ',';
  return `
    <div class="admin-panel" style="margin-top:18px;">
      <h3>Impor CSV — ${escapeHtml(TYPE_CONFIG[type].label)}</h3>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:-4px 0 12px;">
        Satu baris satu data, urutan kolom (pisah dengan${delim===';'?' titik-koma ( ; )':' koma ( , )'}): <code>${conf.labels.join(` ${delim} `)}</code> — tanpa baris header.
        ${conf.delimiterNote?`<br>${escapeHtml(conf.delimiterNote)}`:''}
        <br>Contoh:<br><code style="display:block;margin-top:4px;word-break:break-all;">${escapeHtml(conf.example)}</code>
      </p>
      <textarea id="csvImport_${type}" placeholder="Tempel data CSV di sini…" style="width:100%;min-height:110px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;font-family:inherit;margin-bottom:12px;"></textarea>
      <button class="btn btn-primary" id="csvImportBtn_${type}">${icoUpload()} Impor CSV</button>
    </div>`;
}
function bindCsvImportBlock(type, onDone){
  const conf = CSV_IMPORT_CONFIG[type];
  if(!conf) return;
  const btn = document.getElementById('csvImportBtn_'+type);
  if(!btn) return;
  const delim = conf.delimiter || ',';
  btn.addEventListener('click', ()=>{
    const ta = document.getElementById('csvImport_'+type);
    const raw = ta.value.trim();
    if(!raw){ toast('Tempel data CSV terlebih dahulu'); return; }
    const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    let count = 0;
    lines.forEach(line=>{
      const parts = line.split(delim).map(p=>p.trim());
      if(!parts[0]) return;
      const values = {};
      conf.columns.forEach((key,i)=>{
        const raw = parts[i] || '';
        if(key==='tema'){
          values[key] = raw.split('|').map(s=>s.trim()).filter(Boolean);
        } else if(key==='referensi'){
          if(!raw){ values[key] = []; }
          else {
            const idx = raw.indexOf(' - ');
            values[key] = [idx>-1 ? {kitab: raw.slice(0,idx).trim(), penulis: raw.slice(idx+3).trim()} : {kitab: raw, penulis: ''}];
          }
        } else {
          values[key] = raw;
        }
      });
      adminAddItem(type, values);
      count++;
    });
    toast(`${count} ${TYPE_CONFIG[type].singular.toLowerCase()} berhasil diimpor`);
    ta.value = '';
    renderSidebar('admin');
    if(onDone) onDone();
  });
}

  document.getElementById('adminSearch').addEventListener('input', e=>{ ui.q = e.target.value; draw(); });
  bindCsvImportBlock(type, draw);
  draw();
}

/* ===================== DATA FORM (add / edit) ===================== */
function renderAdminDataForm(type, idStr){
  const cfg = TYPE_CONFIG[type];
  if(!cfg){ renderAdminShell('dashboard', emptyBlock('Tipe data tidak dikenal'), 'Admin'); return; }
  const isNew = idStr === 'new';
  const id = isNew ? null : Number(idStr);
  const existing = isNew ? null : cfg.getAll().find(x=>x.id===id);
  if(!isNew && !existing){ renderAdminShell(type, emptyBlock('Data tidak ditemukan'), cfg.label); return; }

  setCrumb([{label:'Admin',href:'#/admin'},{label:cfg.label,href:'#/admin/data/'+type},{label:isNew?'Tambah':'Edit'}]);

  const cats = getIstilahCats().filter(c=>!CAT_LOCKED.includes(c));

  const fieldHtml = cfg.fields.map(f=>{
    const val = existing ? (existing[f.key]||'') : '';
    if(f.type==='arabic-textarea'){
      return `<div class="form-row"><label>${escapeHtml(f.label)}${f.hint?`<span class="hint">${escapeHtml(f.hint)}</span>`:''}</label>
        <textarea name="${f.key}" class="arabic-input" dir="rtl" placeholder="اكتب هنا…" style="min-height:130px;">${escapeHtml(val)}</textarea></div>`;
    }
    if(f.type==='arabic'){
      return `<div class="form-row"><label>${escapeHtml(f.label)}${f.hint?`<span class="hint">${escapeHtml(f.hint)}</span>`:''}</label>
        <input type="text" name="${f.key}" class="arabic-input" dir="rtl" value="${escapeHtml(val)}" placeholder="اكتب هنا…"></div>`;
    }
    if(f.type==='textarea'){
      return `<div class="form-row"><label>${escapeHtml(f.label)}${f.hint?`<span class="hint">${escapeHtml(f.hint)}</span>`:''}</label>
        <textarea name="${f.key}" style="${f.big?'min-height:220px;':''}">${escapeHtml(val)}</textarea></div>`;
    }
    if(f.type==='taglist'){
      const strVal = Array.isArray(val) ? val.join(', ') : val;
      return `<div class="form-row"><label>${escapeHtml(f.label)}${f.hint?`<span class="hint">${escapeHtml(f.hint)}</span>`:''}</label>
        <input type="text" name="${f.key}" value="${escapeHtml(strVal)}"></div>`;
    }
    if(f.type==='reflist'){
      const strVal = Array.isArray(val) ? val.map(r=>`${r.kitab||''} - ${r.penulis||''}`).join('\n') : val;
      return `<div class="form-row"><label>${escapeHtml(f.label)}${f.hint?`<span class="hint">${escapeHtml(f.hint)}</span>`:''}</label>
        <textarea name="${f.key}">${escapeHtml(strVal)}</textarea></div>`;
    }
    if(f.type==='catselect'){
      return `<div class="form-row"><label>${escapeHtml(f.label)}</label>
        <select name="${f.key}">
          ${cats.map(c=>`<option value="${escapeHtml(c)}" ${val===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}
          <option value="__new__">+ Kategori baru…</option>
        </select>
        <input type="text" name="${f.key}_new" placeholder="Nama kategori baru" style="margin-top:8px;display:none;">
      </div>`;
    }
    return `<div class="form-row"><label>${escapeHtml(f.label)}${f.hint?`<span class="hint">${escapeHtml(f.hint)}</span>`:''}</label>
      <input type="${f.type==='url'?'url':'text'}" name="${f.key}" value="${escapeHtml(val)}" ${f.required?'required':''}></div>`;
  }).join('');

  const body = `
    <form class="admin-form" id="adminForm">
      ${cfg.fixedK?`<div class="badge-sm" style="margin-bottom:16px;">Kategori tetap: ${escapeHtml(cfg.fixedK)}</div>`:''}
      ${fieldHtml}
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">${isNew?'Simpan '+cfg.singular:'Simpan Perubahan'}</button>
        <a href="#/admin/data/${type}" class="btn">Batal</a>
        ${!isNew?`<button type="button" class="btn btn-danger" id="deleteBtn" style="margin-left:auto;">${icoTrash()} Hapus</button>`:''}
      </div>
    </form>
  `;
  renderAdminShell(type, body, (isNew?'Tambah ':'Edit ')+cfg.label);

  const catSelect = document.querySelector('select[name]');
  if(catSelect){
    catSelect.addEventListener('change', ()=>{
      const newInput = document.querySelector(`input[name="${catSelect.name}_new"]`);
      newInput.style.display = catSelect.value==='__new__' ? 'block' : 'none';
    });
  }

  document.getElementById('adminForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const values = {};
    cfg.fields.forEach(f=>{
      if(f.type==='catselect'){
        let v = fd.get(f.key);
        if(v==='__new__'){ v = (fd.get(f.key+'_new')||'Umum').trim() || 'Umum'; }
        values[f.key] = v;
      } else if(f.type==='taglist'){
        values[f.key] = (fd.get(f.key)||'').toString().split(',').map(s=>s.trim()).filter(Boolean);
      } else if(f.type==='reflist'){
        values[f.key] = (fd.get(f.key)||'').toString().split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{
          const idx = line.indexOf(' - ');
          return idx>-1 ? {kitab: line.slice(0,idx).trim(), penulis: line.slice(idx+3).trim()} : {kitab: line, penulis: ''};
        });
      } else {
        values[f.key] = (fd.get(f.key)||'').toString();
      }
    });
    if(isNew){
      const created = adminAddItem(type, values);
      toast(cfg.singular+' berhasil ditambahkan');
      location.hash = '#/admin/data/'+type;
    } else {
      adminUpdateItem(type, id, values);
      toast('Perubahan disimpan');
      location.hash = '#/admin/data/'+type;
    }
  });
  if(!isNew){
    document.getElementById('deleteBtn').addEventListener('click', ()=>{
      showConfirm('Hapus '+cfg.singular+'?', `"${existing[titleFieldOf(type)]||''}" akan dihapus permanen dari sesi ini.`, ()=>{
        adminDeleteItem(type, id);
        toast(cfg.singular+' dihapus');
        location.hash = '#/admin/data/'+type;
      });
    });
  }
}

/* ===================== KATEGORI MANAGEMENT ===================== */
function renderAdminKategori(){
  setCrumb([{label:'Admin',href:'#/admin'},{label:'Kategori'}]);
  const cats = getIstilahCats();

  function draw(){
    document.getElementById('catList').innerHTML = cats.map(c=>{
      const cnt = getIstilah().filter(d=>(d.k||'Umum')===c).length;
      return `<div class="cat-manage-row">
        <div style="flex:1;">
          <div class="cm-name" contenteditable="true" data-cat="${escapeHtml(c)}" spellcheck="false">${escapeHtml(c)}</div>
          <div class="cm-count">${cnt} istilah</div>
        </div>
        <button class="btn btn-icon" data-savecat="${escapeHtml(c)}" title="Simpan nama">${icoEdit()}</button>
        <button class="btn btn-icon btn-danger" data-delcat="${escapeHtml(c)}" title="Hapus kategori">${icoTrash()}</button>
      </div>`;
    }).join('');

    document.querySelectorAll('[data-savecat]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const oldName = b.getAttribute('data-savecat');
        const nameEl = document.querySelector(`[data-cat="${CSS.escape(oldName)}"]`);
        const newName = nameEl.textContent.trim();
        if(!newName || newName===oldName) return;
        DATA.forEach(d=>{ if((d.k||'Umum')===oldName) d.k = newName; });
        ADMIN.extraCategories = ADMIN.extraCategories.filter(c=>c!==oldName);
        if(!getIstilah().some(d=>(d.k||'Umum')===newName)) ADMIN.extraCategories.push(newName);
        logActivity(`Kategori "${oldName}" diganti nama menjadi "${newName}"`);
        toast('Kategori diperbarui');
        renderAdminKategori();
      });
    });
    document.querySelectorAll('[data-delcat]').forEach(b=>{
      b.addEventListener('click', ()=>{
        const name = b.getAttribute('data-delcat');
        showConfirm('Hapus Kategori?', `Semua istilah berkategori "${name}" akan dipindahkan ke kategori "Umum".`, ()=>{
          DATA.forEach(d=>{ if((d.k||'Umum')===name) d.k = 'Umum'; });
          ADMIN.extraCategories = ADMIN.extraCategories.filter(c=>c!==name);
          logActivity(`Kategori "${name}" dihapus, entri dipindahkan ke Umum`);
          toast('Kategori dihapus');
          renderAdminKategori();
        });
      });
    });
  }

  const body = `
    <div class="admin-panel" style="max-width:640px;">
      <h3>Kategori Istilah Tasawuf</h3>
      <p style="font-size:12px;color:var(--ink-faint);margin:-8px 0 14px;">Klik nama kategori untuk mengubahnya langsung, lalu tekan tombol simpan. Kategori Tokoh Sufi, Kitab, dan Kitab Tasawuf dikelola otomatis dan tidak tampil di sini.</p>
      <div id="catList"></div>
      <div class="cat-add-row">
        <input type="text" id="newCatInput" placeholder="Nama kategori baru…">
        <button class="btn btn-primary" id="addCatBtn">${icoPlus()} Tambah</button>
      </div>
    </div>
  `;
  renderAdminShell('kategori', body, 'Kategori');
  draw();
  document.getElementById('addCatBtn').addEventListener('click', ()=>{
    const input = document.getElementById('newCatInput');
    const name = input.value.trim();
    if(!name) return;
    if(!getIstilahCats().includes(name)) ADMIN.extraCategories.push(name);
    logActivity(`Kategori baru dibuat: ${name}`);
    toast(`Kategori "${name}" siap dipakai — pilih saat menambah/mengubah istilah.`);
    input.value = '';
    renderAdminKategori();
  });
}

/* ===================== BACKUP & RESTORE ===================== */
function renderAdminBackup(){
  setCrumb([{label:'Admin',href:'#/admin'},{label:'Backup & Restore'}]);
  const body = `
    <div class="admin-grid-2">
      <div class="admin-panel">
        <h3>Backup Data</h3>
        <p style="font-size:12.5px;color:var(--ink-soft);margin:-4px 0 14px;">Unduh seluruh data (istilah, tokoh, kitab, dzikir, hizib, qasidah, artikel) dalam satu file JSON.</p>
        <button class="btn btn-primary" id="backupBtn">${icoDb()} Unduh Backup (JSON)</button>
      </div>
      <div class="admin-panel">
        <h3>Restore Data</h3>
        <p style="font-size:12.5px;color:var(--ink-soft);margin:-4px 0 14px;">Unggah file backup JSON untuk memulihkan data pada sesi ini.</p>
        <input type="file" id="restoreFile" accept="application/json" style="font-size:12.5px;">
      </div>
    </div>
    <div class="admin-panel" style="margin-top:16px;">
      <h3>Impor Istilah dari CSV</h3>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:-4px 0 14px;">Format tiap baris: <code>Nama,Kategori,Definisi Singkat</code> — tanpa header.</p>
      <textarea id="csvInput" placeholder="Contoh:&#10;Tawajjuh,Tarekat,Menghadapkan hati kepada Allah&#10;Qana'ah,Akhlak,Merasa cukup dengan pemberian Allah" style="width:100%;min-height:110px;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;font-family:inherit;margin-bottom:12px;"></textarea>
      <button class="btn btn-primary" id="csvImportBtn">${icoUpload()} Impor CSV</button>
    </div>
  `;
  renderAdminShell('backup', body, 'Backup & Restore');

  document.getElementById('backupBtn').addEventListener('click', doBackupDownload);

  document.getElementById('restoreFile').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const payload = JSON.parse(reader.result);
        if(payload.data){ DATA.length = 0; DATA.push(...payload.data); }
        if(payload.extra){ Object.keys(payload.extra).forEach(k=>{
          if(!EXTRA[k]) return;
          if(Array.isArray(EXTRA[k])){ EXTRA[k].length=0; EXTRA[k].push(...payload.extra[k]); }
          else { Object.assign(EXTRA[k], payload.extra[k]); }
        }); }
        logActivity('Data dipulihkan dari file backup');
        toast('Restore berhasil');
        router();
      }catch(err){ toast('Gagal membaca file backup'); }
    };
    reader.readAsText(file);
  });

  document.getElementById('csvImportBtn').addEventListener('click', ()=>{
    const raw = document.getElementById('csvInput').value.trim();
    if(!raw){ toast('Tempel data CSV terlebih dahulu'); return; }
    const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
    let count = 0;
    lines.forEach(line=>{
      const parts = line.split(',');
      if(parts.length<1 || !parts[0].trim()) return;
      const [n, k, s] = parts;
      adminAddItem('istilah', {n:(n||'').trim(), k:(k||'Umum').trim()||'Umum', s:(s||'').trim(), a:'', d:'', q:'', h:'', u:'', r:''});
      count++;
    });
    toast(`${count} istilah berhasil diimpor`);
    document.getElementById('csvInput').value = '';
  });
}

/* ===================== SIDEBAR KALAM HIKMAH ===================== */
const SIDEBAR_HIKMAH = [
  "Perjalanan terindah seorang hamba adalah saat hatinya dekat dengan Tuhannya.",
  "Zikir yang paling utama adalah zikir yang menghadirkan Allah dalam setiap langkah.",
  "Ilmu tanpa amal ibarat pohon tanpa buah.",
  "Sabar adalah kunci datangnya pertolongan Allah.",
  "Hati yang bersih akan selalu menemukan jalan menuju cahaya.",
  "Zuhud bukan meninggalkan dunia, tetapi tidak membiarkan dunia menguasai hati.",
  "Setiap kesulitan adalah undangan untuk semakin dekat kepada-Nya.",
];
function initSidebarHikmah(){
  const host = document.getElementById('sidebarHikmah');
  if(!host) return;
  host.innerHTML = `
    ${SIDEBAR_HIKMAH.map((q,i)=>`
      <div class="side-hikmah-slide ${i===0?'active':''}" data-i="${i}">
        <div class="side-hikmah-quote">"${escapeHtml(q)}"</div>
      </div>`).join('')}
    <div class="side-hikmah-dots">
      ${SIDEBAR_HIKMAH.map((_,i)=>`<button class="side-hikmah-dot ${i===0?'active':''}" data-dot="${i}" aria-label="Slide ${i+1}"></button>`).join('')}
    </div>
  `;
  let idx = 0;
  const slides = host.querySelectorAll('.side-hikmah-slide');
  const dots = host.querySelectorAll('.side-hikmah-dot');
  function goTo(i){
    idx = i;
    slides.forEach((s,j)=>s.classList.toggle('active', j===i));
    dots.forEach((d,j)=>d.classList.toggle('active', j===i));
  }
  dots.forEach(dot=>{
    dot.addEventListener('click', ()=>goTo(Number(dot.getAttribute('data-dot'))));
  });
  setInterval(()=>{ goTo((idx+1) % SIDEBAR_HIKMAH.length); }, 5000);
}

/* ===================== INIT ===================== */
window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', ()=>{
  bindGlobalSearch();
  bindMobileMenu();
  bindTopbarButtons();
  initSidebarHikmah();
  router();
});

})();
